name: CI

on:
  push:
  pull_request:

# Least-privilege default token (only needs to read the repo). (#274)
permissions:
  contents: read

# Cancel superseded runs for the same ref so a push doesn't pile up duplicate
# in-flight pipelines (push + pull_request both fire on PR commits).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.34.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 26
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --locked
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo install cargo-audit --locked
      - run: cargo install cargo-deny --locked
      - run: cargo audit
      - run: cargo deny check
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm generate:client
        working-directory: frontend
      # Fail if the committed client is out of date with the OpenAPI spec
      # (parity with the GitLab pipeline). (#274)
      - run: git diff --exit-code -- src/api/schema.ts
        working-directory: frontend
      - run: pnpm accessibility:check
        working-directory: frontend
      - run: pnpm test:a11y
        working-directory: frontend
      - run: pnpm typecheck
        working-directory: frontend
      - run: pnpm build
        working-directory: frontend
      - run: pnpm audit --audit-level high
        working-directory: frontend
      - run: docker build --pull --tag paperless-archivist:ci .
