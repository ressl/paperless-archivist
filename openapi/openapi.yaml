          type: array
          items: { $ref: "#/components/schemas/NeedsAttentionItem" }
    UpdateWorkflowModeRequest:
      type: object
      required: [mode]
      properties:
        mode: { $ref: "#/components/schemas/ProcessingMode" }
    WorkflowSafetyStatus:
      type: object
      required: [paused, dry_run]
      properties:
        paused: { type: boolean }
        dry_run: { type: boolean }
        hourly_document_limit:
          type: [integer, "null"]
        daily_document_limit:
          type: [integer, "null"]
        hourly_remaining:
          type: [integer, "null"]
        daily_remaining:
          type: [integer, "null"]
    UpdateWorkflowControlsRequest:
      type: object
      additionalProperties: false
      properties:
        paused: { type: boolean }
        dry_run: { type: boolean }
        hourly_document_limit:
          type: [integer, "null"]
        daily_document_limit:
          type: [integer, "null"]
    WorkflowDebugContext:
      type: object
      additionalProperties: true
      properties:
        selector_reason:
          type: [string, "null"]
        workflow_mode:
          oneOf:
            - $ref: "#/components/schemas/ProcessingMode"
            - type: "null"
        workflow_paused:
          type: [boolean, "null"]
        dry_run:
          type: [boolean, "null"]
        prompt_language:
          type: [string, "null"]
        tag_output_language:
          type: [string, "null"]
        detected_language:
          type: [string, "null"]
        detected_language_confidence:
          type: [number, "null"]
          format: float
        detected_language_source:
          type: [string, "null"]
        current_run_status:
          type: [string, "null"]
        last_error:
          type: [string, "null"]
        next_required_stage:
          type: [string, "null"]
    DashboardResponse:
      type: object
      required: [counts, stats]
      properties:
        counts: { $ref: "#/components/schemas/BacklogCounts" }
        stats: { $ref: "#/components/schemas/DashboardStats" }
    StatisticsSummary:
      type: object
      required: [request_count, input_tokens, output_tokens, jobs_succeeded, jobs_failed, jobs_cancelled]
      properties:
        request_count: { type: integer, format: int64 }
        input_tokens: { type: integer, format: int64 }
        output_tokens: { type: integer, format: int64 }
        avg_duration_ms: { type: [number, "null"], format: double }
        # Null unless at least one provider has token costs configured.
        estimated_cost_usd: { type: [number, "null"], format: double }
        jobs_succeeded: { type: integer, format: int64 }
        jobs_failed: { type: integer, format: int64 }
        jobs_cancelled: { type: integer, format: int64 }
    StatisticsTimePoint:
      type: object
      required: [bucket, request_count, input_tokens, output_tokens]
      properties:
        bucket: { type: string, format: date-time }
        request_count: { type: integer, format: int64 }
        input_tokens: { type: integer, format: int64 }
        output_tokens: { type: integer, format: int64 }
        avg_duration_ms: { type: [number, "null"], format: double }
    StatisticsThroughputPoint:
      type: object
      required: [bucket, succeeded, failed, cancelled]
      properties:
        bucket: { type: string, format: date-time }
        succeeded: { type: integer, format: int64 }
        failed: { type: integer, format: int64 }
        cancelled: { type: integer, format: int64 }
    StatisticsBreakdownRow:
      type: object
      required: [request_count, input_tokens, output_tokens]
      properties:
        # Exactly one of provider/model/stage is present, matching the
        # breakdown list the row belongs to.
        provider: { type: string }
        model: { type: string }
        stage: { type: string }
        request_count: { type: integer, format: int64 }
        input_tokens: { type: integer, format: int64 }
        output_tokens: { type: integer, format: int64 }
        avg_duration_ms: { type: [number, "null"], format: double }
        # Only computed for the by-provider breakdown (costs are configured
        # per provider); always null in by_model / by_stage rows.
        estimated_cost_usd: { type: [number, "null"], format: double }
    StatisticsResponse:
      type: object
      required: [from, to, bucket, summary, time_series, throughput_series, by_provider, by_model, by_stage]
      properties:
        from: { type: string, format: date-time }
        to: { type: string, format: date-time }
        bucket: { type: string, enum: ["hour", "day", "week", "month"] }
        summary: { $ref: "#/components/schemas/StatisticsSummary" }
        # Both series share one zero-filled bucket axis: every bucket of the
        # resolved range appears (empty ones with zero counts), except for
        # ranges so large that zero-filling is skipped and only non-empty
        # buckets are returned.
        time_series:
          type: array
          items: { $ref: "#/components/schemas/StatisticsTimePoint" }
        throughput_series:
          type: array
          items: { $ref: "#/components/schemas/StatisticsThroughputPoint" }
        by_provider:
          type: array
          items: { $ref: "#/components/schemas/StatisticsBreakdownRow" }
        by_model:
          type: array
          items: { $ref: "#/components/schemas/StatisticsBreakdownRow" }
        by_stage:
          type: array
          items: { $ref: "#/components/schemas/StatisticsBreakdownRow" }
    DocumentInventoryItem:
      type: object
      additionalProperties: true
      properties:
        debug_context:
          oneOf:
            - $ref: "#/components/schemas/WorkflowDebugContext"
            - type: "null"
    StandardMetadataSuggestion:
      type: object
      additionalProperties: true
      properties:
        field:
          type: string
          enum: [correspondent, document_type, document_date]
        suggested_name:
          type: [string, "null"]
        suggested_date:
          type: [string, "null"]
          format: date
        current_correspondent:
          type: [integer, "null"]
        current_document_type:
          type: [integer, "null"]
        current_date:
          type: [string, "null"]
        confidence:
          type: [number, "null"]
          format: float
        evidence:
          type: [string, "null"]
    DocumentPatch:
      type: object
      additionalProperties: false
      properties:
        content: { type: string }
        title: { type: string }
        tags:
          type: array
          items: { type: integer }
        correspondent:
          type: [integer, "null"]
        document_type:
          type: [integer, "null"]
        created:
          type: string
          format: date
        custom_fields: true
        standard_metadata:
          $ref: "#/components/schemas/StandardMetadataSuggestion"
    ReviewItem:
      type: object
      additionalProperties: true
      required: [id, paperless_document_id, stage, status, suggested_patch, created_at]
      properties:
        id: { type: string, format: uuid }
        paperless_document_id: { type: integer }
        stage: { $ref: "#/components/schemas/Stage" }
        status: { type: string }
        suggested_patch:
          $ref: "#/components/schemas/DocumentPatch"
        edited_patch:
          oneOf:
            - $ref: "#/components/schemas/DocumentPatch"
            - type: "null"
        validation_warnings: true
        conflict_fields:
          type: array
          items: { type: string }
          description: Patch field names whose Paperless values changed after review creation.
        conflicted_at: { type: [string, "null"], format: date-time }
        debug_context:
          oneOf:
            - $ref: "#/components/schemas/WorkflowDebugContext"
            - type: "null"
        paperless_title:
          type: [string, "null"]
          description: >-
            Cached Paperless title from the document_inventory, surfaced so the
            review UI can show the actual document title instead of falling
            back to "Document {id}" when the suggested_patch has no title.
        created_at: { type: string, format: date-time }
    AuditEvent:
      type: object
      additionalProperties: true
    AuditIntegrityReport:
      type: object
      required: [ok, checked_events, legacy_events, v1_events, v2_events]
      properties:
        ok: { type: boolean }
        checked_events: { type: integer, format: int64 }
        legacy_events: { type: integer, format: int64 }
        v1_events: { type: integer, format: int64 }
        v2_events: { type: integer, format: int64 }
        latest_event_hash: { type: [string, "null"] }
        broken_event_id: { type: [string, "null"], format: uuid }
        broken_reason: { type: [string, "null"] }
    RetentionResult:
      type: object
      required:
        [
          audit_events_deleted,
          ai_artifacts_deleted,
          ocr_page_cache_deleted,
          pipeline_runs_deleted,
        ]
      properties:
        audit_events_deleted: { type: integer, format: int64 }
        ai_artifacts_deleted: { type: integer, format: int64 }
        ocr_page_cache_deleted: { type: integer, format: int64 }
        pipeline_runs_deleted:
          type: integer
          format: int64
          description: >-
            Terminal pipeline runs pruned past runs_retention_days; their jobs
            and AI artifacts are deleted with them via CASCADE.
    RecoveryCandidate:
      type: object
      additionalProperties: false
      required: [run_id, paperless_document_id, status, updated_at, reason]
      properties:
        run_id: { type: string, format: uuid }
        job_id: { type: [string, "null"], format: uuid }
        paperless_document_id: { type: integer }
        stage:
          oneOf:
            - $ref: "#/components/schemas/Stage"
            - type: "null"
        status: { type: string }
        lease_owner: { type: [string, "null"] }
        lease_until: { type: [string, "null"], format: date-time }
        updated_at: { type: string, format: date-time }
        reason: { type: string }
    RecoverySummary:
      type: object
      additionalProperties: false
      required: [stale_leases_requeued, stuck_runs_failed, stuck_runs_completed]
      properties:
        stale_leases_requeued: { type: integer }
        stuck_runs_failed: { type: integer }
        stuck_runs_completed: { type: integer }
    RecoveryRequest:
      type: object
      additionalProperties: false
      properties:
        older_than_seconds: { type: integer, minimum: 60, maximum: 86400 }
    RecoveryStatusResponse:
      type: object
      required: [older_than_seconds, items]
      properties:
        older_than_seconds: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/RecoveryCandidate" }
    RecoveryActionResponse:
      type: object
      required: [older_than_seconds, summary]
      properties:
        older_than_seconds: { type: integer }
        summary: { $ref: "#/components/schemas/RecoverySummary" }
    Prompt:
      type: object
      required: [id, stage, name, version, content, active, created_at]
      properties:
        id: { type: string, format: uuid }
        stage: { $ref: "#/components/schemas/Stage" }
        name: { type: string }
        version: { type: integer }
        content: { type: string }
        output_schema: true
        active: { type: boolean }
        created_at: { type: string, format: date-time }
    PromptUsage:
      type: object
      required: [prompt_id, run_count, job_count, avg_duration_ms]
      properties:
        prompt_id: { type: string, format: uuid }
        run_count: { type: integer, format: int64 }
        job_count: { type: integer, format: int64 }
        last_used_at:
          type: [string, "null"]
          format: date-time
        avg_duration_ms: { type: number, format: double }
        last_provider:
          type: [string, "null"]
        last_model:
          type: [string, "null"]
    PromptExperiment:
      type: object
      additionalProperties: false
      required: [group, total, approved, rejected, edited, applied, mean_confidence]
      properties:
        group: { type: string }
        total: { type: integer, format: int64, minimum: 0 }
        approved: { type: integer, format: int64, minimum: 0 }
        rejected: { type: integer, format: int64, minimum: 0 }
        edited: { type: integer, format: int64, minimum: 0 }
        applied: { type: integer, format: int64, minimum: 0 }
        mean_confidence: { type: [number, "null"], format: double }
    PromptExperimentsResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/PromptExperiment" }
    DuplicateDocument:
      type: object
      additionalProperties: false
      required: [paperless_document_id, title]
      properties:
        paperless_document_id: { type: integer, format: int32 }
        title: { type: [string, "null"] }
    DuplicateGroup:
      type: object
      additionalProperties: false
      required: [hash, documents]
      properties:
        hash: { type: string }
        documents:
          type: array
          minItems: 2
          items: { $ref: "#/components/schemas/DuplicateDocument" }
    InventoryDuplicatesResponse:
      type: object
      additionalProperties: false
      required: [groups, paperless_base]
      properties:
        groups:
          type: array
          maxItems: 200
          items: { $ref: "#/components/schemas/DuplicateGroup" }
        paperless_base:
          type: string
          description: Public Paperless URL without a trailing slash, falling back to base_url.
    QueueCountResponse:
      type: object
      additionalProperties: false
      required: [queued]
      properties:
        queued: { type: integer, format: int64, minimum: 0 }
    RerunBatchRequest:
      type: object
      additionalProperties: false
      required: [document_ids, stages]
      properties:
        document_ids:
          type: array
          minItems: 1
          items: { type: integer, format: int32 }
        stages:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/Stage" }
    RerunFailedBatchResponse:
      type: object
      additionalProperties: false
      required: [queued, candidates]
      properties:
        queued: { type: integer, format: int64, minimum: 0 }
        candidates: { type: integer, format: int64, minimum: 0 }
    ReviewAutoFixRequest:
      type: object
      additionalProperties: false
      properties:
        limit:
          type: [integer, "null"]
          format: int64
          description: Requested batch size; the runtime clamps values to the range 1 through 2000.
    ReviewAutoFixPreviewSample:
      type: object
      additionalProperties: false
      required: [id, paperless_document_id, stage, action, fields_dropped]
      properties:
        id: { type: string, format: uuid }
        paperless_document_id: { type: integer, format: int32 }
        stage: { $ref: "#/components/schemas/Stage" }
        action: { type: string, enum: [apply, reject] }
        fields_dropped:
          type: array
          items: { type: string }
    ReviewAutoFixPreviewResponse:
      type: object
      additionalProperties: false
      required: [total_pending, would_apply, would_reject, sample]
      properties:
        total_pending: { type: integer, format: int64, minimum: 0 }
        would_apply: { type: integer, format: int64, minimum: 0 }
        would_reject: { type: integer, format: int64, minimum: 0 }
        sample:
          type: array
          maxItems: 20
          items: { $ref: "#/components/schemas/ReviewAutoFixPreviewSample" }
    ReviewAutoFixError:
      type: object
      additionalProperties: false
      required: [id, error]
      properties:
        id: { type: string, format: uuid }
        error: { type: string }
    ReviewAutoFixBulkResponse:
      type: object
      additionalProperties: false
      required: [applied, rejected, errors]
      properties:
        applied: { type: integer, format: int64, minimum: 0 }
        rejected: { type: integer, format: int64, minimum: 0 }
        errors:
          type: array
          items: { $ref: "#/components/schemas/ReviewAutoFixError" }
    ReviewAutoFixSingleResponse:
      type: object
      additionalProperties: false
      required: [action]
      properties:
        action: { type: string, enum: [applied, rejected] }
    UnblockJobsRequest:
      type: object
      additionalProperties: false
      properties:
        error_substring:
          type: [string, "null"]
          description: Restrict requeueing to failed predecessor errors containing this text.
        clear_provider_cooldowns:
          type: boolean
          description: Defaults to true when omitted.
          example: true
    UnblockJobsResponse:
      type: object
      additionalProperties: false
      required: [predecessors_requeued, runs_unblocked, cooldowns_cleared, retries_released]
      properties:
        predecessors_requeued: { type: integer, format: int64, minimum: 0 }
        runs_unblocked: { type: integer, format: int64, minimum: 0 }
        cooldowns_cleared: { type: integer, format: int64, minimum: 0 }
        retries_released: { type: integer, format: int64, minimum: 0 }
    ProviderCooldown:
      type: object
      additionalProperties: false
      required: [provider_name, cooldown_until, reason, set_at]
      properties:
        provider_name: { type: string }
        cooldown_until: { type: string, format: date-time }
        reason: { type: string }
        set_at: { type: string, format: date-time }
    ProviderCooldownsResponse:
      type: object
      additionalProperties: false
      required: [cooldowns]
      properties:
        cooldowns:
          type: array
          items: { $ref: "#/components/schemas/ProviderCooldown" }
    ClearProviderCooldownRequest:
      type: object
      additionalProperties: false
      properties:
        provider_name:
          type: [string, "null"]
          description: Provider to clear; omit or set null to clear every active cooldown.
    ClearProviderCooldownResponse:
      type: object
      additionalProperties: false
      required: [cleared, released]
      properties:
        cleared: { type: integer, format: int64, minimum: 0 }
        released: { type: integer, format: int64, minimum: 0 }
    ReleaseScheduledRetriesResponse:
      type: object
      additionalProperties: false
      required: [released]
      properties:
        released: { type: integer, format: int64, minimum: 0 }
    WebhookConsumedRequest:
      description: A non-empty document batch, one document, or both shapes together.
      anyOf:
        - type: object
          additionalProperties: false
          required: [document_ids]
          properties:
            document_ids:
              type: array
              minItems: 1
              items: { type: integer, format: int32, minimum: 1 }
            document_id:
              type: [integer, "null"]
              format: int32
              minimum: 1
        - type: object
          additionalProperties: false
          required: [document_id]
          properties:
            document_ids:
              type: [array, "null"]
              items: { type: integer, format: int32, minimum: 1 }
            document_id: { type: integer, format: int32, minimum: 1 }
    TestPromptRequest:
      type: object
      required: [stage, content]
      properties:
        stage: { $ref: "#/components/schemas/Stage" }
        content: { type: string }
        sample_text:
          type: [string, "null"]
        paperless_document_id:
          type: [integer, "null"]
        provider_name:
          type: [string, "null"]
        model:
          type: [string, "null"]
    TestPromptResponse:
      type: object
      required: [provider, model, stage, raw_text, validation_errors, warnings, duration_ms]
      properties:
        provider: { type: string }
        model: { type: string }
        stage: { $ref: "#/components/schemas/Stage" }
        raw_text: { type: string }
        parsed: true
        validation_errors:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }
        duration_ms: { type: integer, format: int32 }
    DocumentChatSource:
      type: object
      required: [paperless_document_id, snippet, score, source_kind]
      properties:
        paperless_document_id: { type: integer }
        title:
          type: [string, "null"]
        snippet: { type: string }
        score: { type: number, format: double }
        source_kind: { type: string }
    AiRuntimeHints:
      type: object
      required: [provider, reachable]
      properties:
        provider: { type: string }
        reachable: { type: boolean }
        version: { type: [string, "null"] }
        loaded_models:
          type: array
          items: { $ref: "#/components/schemas/AiLoadedModel" }
        # Env-only on the Ollama pod, not surfaced via Ollamas HTTP API.
        # Always null; the `hint` string explains where to set them.
        num_parallel: { type: [integer, "null"] }
        max_loaded_models: { type: [integer, "null"] }
        keep_alive: { type: [string, "null"] }
        hint: { type: [string, "null"] }
    AiLoadedModel:
      type: object
      required: [name]
      properties:
        name: { type: string }
        size_vram_bytes: { type: [integer, "null"], format: int64 }
        # Optional: when the model was last accessed (epoch seconds).
        last_used_at: { type: [string, "null"], format: date-time }
    MetadataTrace:
      type: object
      required: [paperless_document_id, current_state, latest_run]
      properties:
        paperless_document_id: { type: integer }
        current_state:
          type: object
          required: [tags]
          properties:
            title: { type: [string, "null"] }
            correspondent: { type: [string, "null"] }
            document_type: { type: [string, "null"] }
            document_date: { type: [string, "null"] }
            tags:
              type: array
              items: { type: string }
        latest_run:
          $ref: "#/components/schemas/MetadataTraceRun"
    MetadataTraceRun:
      type: object
      required: [run_id, stage, status, created_at, per_field_outcomes]
      properties:
        run_id: { type: string, format: uuid }
        stage: { type: string }
        status: { type: string }
        created_at: { type: string, format: date-time }
        applied_at: { type: [string, "null"], format: date-time }
        model: { type: [string, "null"] }
        provider: { type: [string, "null"] }
        llm_suggestion:
          # The raw `ai_artifacts.normalized_output` payload. Free-form because
          # its inner shape evolves with prompt changes — frontends should treat
          # this as best-effort debug content.
          nullable: true
          type: object
          additionalProperties: true
        per_field_outcomes:
          type: array
          items: { $ref: "#/components/schemas/MetadataFieldOutcome" }
    MetadataFieldOutcome:
      type: object
      required: [field, outcome, warnings]
      properties:
        field:
          type: string
          enum: [title, correspondent, document_type, document_date, tags, fields]
        outcome:
          type: string
          enum: [applied, review, skipped, dropped, rejected]
        # Free-form because each field has its own value type (string, array,
        # object). The frontend renders by field name.
        value: true
        confidence: { type: [number, "null"], format: float }
        reason:
          type: [string, "null"]
          # Canonical machine strings — see docs/METADATA_TRACE_CONTRACT.md.
          # Frontends translate these via inventory.diagnose.reason.* keys.
        warnings:
          type: array
          items:
            type: object
            additionalProperties: true
    DocumentChatSession:
      type: object
      required: [id, title, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        created_by:
          type: [string, "null"]
          format: uuid
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    DocumentChatMessage:
      type: object
      required: [id, session_id, role, content, sources, created_at]
      properties:
        id: { type: string, format: uuid }
        session_id: { type: string, format: uuid }
        role: { type: string, enum: [user, assistant, system] }
        content: { type: string }
        provider:
          type: [string, "null"]
        model:
          type: [string, "null"]
        metadata: true
        sources:
          type: array
          items: { $ref: "#/components/schemas/DocumentChatSource" }
        created_at: { type: string, format: date-time }
    CreateDocumentChatSessionRequest:
      type: object
      properties:
        title: { type: string }
    PostDocumentChatMessageRequest:
      type: object
      required: [question]
      properties:
        question: { type: string, minLength: 3, maxLength: 4000 }
        document_ids:
          type: [array, "null"]
          maxItems: 50
          items: { type: integer }
        max_sources:
          type: integer
          minimum: 1
          maximum: 10
    PostDocumentChatMessageResponse:
      type: object
      required: [session_id, user_message_id, assistant_message_id, answer, sources]
      properties:
        session_id: { type: string, format: uuid }
        user_message_id: { type: string, format: uuid }
        assistant_message_id: { type: string, format: uuid }
        answer: { type: string }
        sources:
          type: array
          items: { $ref: "#/components/schemas/DocumentChatSource" }
    Session:
      type: object
      additionalProperties: true
    User:
      type: object
      additionalProperties: true
paths:
  /healthz:
    get:
      security: []
      responses:
        "200":
          description: Healthy
          content:
            text/plain:
              schema: { type: string }
  /readyz:
    get:
      security: []
      responses:
        "200":
          description: Ready
          content:
            text/plain:
              schema: { type: string }
  /metrics:
    get:
      security: []
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema: { type: string }
  /api/auth/login:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
