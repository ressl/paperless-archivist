        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClearProviderCooldownRequest" }
      responses:
        "200":
          description: Cleared cooldown and released job counts
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClearProviderCooldownResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /api/operations/release-scheduled-retries:
    post:
      summary: Wake jobs deferred by a cooldown or another backoff
      description: Requires the runs:write permission and an interactive user session.
      security:
        - cookieSession: []
      parameters:
        - $ref: "#/components/parameters/RequiredCsrfToken"
      responses:
        "200":
          description: Released job count
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReleaseScheduledRetriesResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalServerError" }
  /api/audit:
    get:
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, format: int64, minimum: 1, maximum: 500 }
      responses:
        "200": { description: Audit events }
  /api/audit/export.csv:
    get:
      responses:
        "200":
          description: Audit events as CSV
          content:
            text/csv:
              schema: { type: string }
  /api/audit/integrity:
    get:
      responses:
        "200":
          description: Audit hash-chain verification
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditIntegrityReport" }
  /api/audit/retention/apply:
    post:
      responses:
        "200":
          description: Applied configured audit and AI artifact retention
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RetentionResult" }
  /api/users:
    get:
      responses:
        "200": { description: Users }
    post:
      description: Create a user. Usernames and non-empty emails share one trimmed, case-insensitive identity namespace.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, roles]
              properties:
                username: { type: string }
                email: { type: [string, "null"] }
                password: { type: string, format: password }
                roles:
                  type: array
                  items: { $ref: "#/components/schemas/Role" }
      responses:
        "200": { description: Created user }
        "400": { description: Invalid or blank username }
        "409": { description: Normalized username or email is already assigned }
  /api/users/{id}/enable:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Enabled user }
  /api/users/{id}/disable:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Disabled user and revoked sessions }
        "409": { description: Rejected because this is the last enabled administrator }
  /api/users/{id}/roles:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roles]
              properties:
                roles:
                  type: array
                  items: { $ref: "#/components/schemas/Role" }
      responses:
        "200": { description: Updated user roles }
        "409": { description: Rejected because this is the last enabled administrator }
  /api/users/{id}/reset-password:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string, format: password }
      responses:
        "200": { description: Reset password and revoked sessions }
  /api/api-tokens:
    get:
      responses:
        "200": { description: API tokens }
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scopes]
              properties:
                name: { type: string }
                expires_in_days: { type: [integer, "null"] }
                scopes:
                  type: array
                  items:
                    type: string
                    enum:
                      - runs:read
                      - runs:write
                      - inventory:read
                      - batches:write
                      - chat:write
                      - reviews:read
                      - reviews:write
                      - settings:read
                      - settings:write
                      - users:manage
                      - audit:read
      responses:
        "200": { description: Created token, raw token shown once }
  /api/api-tokens/{id}/rotate:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                expires_in_days: { type: [integer, "null"] }
      responses:
        "200": { description: Rotated token, raw token shown once }
  /api/api-tokens/{id}:
    delete:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Revoked token }
