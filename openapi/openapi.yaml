            type: string
            enum: ["24h", "7d", "30d", "90d", "12m", "all"]
            default: "24h"
      responses:
        "200":
          description: Dashboard counts and analytics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardResponse" }
  /api/dashboard/live:
    get:
      responses:
        "200":
          description: Live processing and lightweight debug status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardLiveStatus" }
  /api/statistics:
    get:
      description: >-
        Usage, cost and pipeline-throughput analytics over a custom time range
        for the Statistics page. Defaults apply only when a parameter is
        absent or blank; a present-but-unparseable value is rejected with 400.
      parameters:
        - name: from
          in: query
          description: >-
            Inclusive range start: an RFC3339 timestamp or a bare YYYY-MM-DD
            date (the day's first instant, UTC). Defaults to `to` minus 30
            days.
          schema: { type: string }
        - name: to
          in: query
          description: >-
            Exclusive range end: an RFC3339 timestamp or a bare YYYY-MM-DD
            date. A bare date means the END of that day (the next UTC
            midnight), so `from` and `to` naming the same day cover exactly
            that day. Defaults to now.
          schema: { type: string }
        - name: bucket
          in: query
          description: Time-series bucket granularity.
          schema:
            type: string
            enum: ["hour", "day", "week", "month"]
            default: "day"
      responses:
        "200":
          description: Statistics summary, zero-filled time series and breakdowns
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatisticsResponse" }
        "400":
          description: Unparseable from/to, from not before to, or unknown bucket
  /api/workflow/mode:
    put:
      requestBody:
