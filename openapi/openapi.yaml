openapi: 3.1.0
info:
  title: Paperless Archivist API
  version: 0.2.0
servers:
  - url: /
security:
  - cookieSession: []
  - bearerToken: []
components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: pa_session
    bearerToken:
      type: http
      scheme: bearer
  schemas:
    Role:
      type: string
      enum: [viewer, reviewer, operator, admin, auditor]
    Stage:
      type: string
      enum: [ocr, ocr_fix, tags, title, correspondent, document_type, document_date, fields, apply]
    ProcessingMode:
      type: string
      enum: [manual_review, auto_select_review, full_auto]
    AiProviderKind:
      type: string
      enum: [ollama, openai, anthropic, openai_compatible]
    AiProviderSettings:
      type: object
      required: [name, kind, base_url, enabled]
      properties:
        name: { type: string }
        kind: { $ref: "#/components/schemas/AiProviderKind" }
        base_url: { type: string }
        default_text_model: { type: [string, "null"] }
        default_vision_model: { type: [string, "null"] }
        cost_per_1m_input_tokens_usd: { type: [number, "null"], format: double }
        cost_per_1m_output_tokens_usd: { type: [number, "null"], format: double }
        secret_id: { type: [string, "null"], format: uuid }
        enabled: { type: boolean }
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }
    MeResponse:
      type: object
      required: [username, roles]
      properties:
        username: { type: string }
        roles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
        csrf_token:
          type: [string, "null"]
    OidcConfigResponse:
      type: object
      required: [enabled]
      properties:
        enabled: { type: boolean }
        login_url:
          type: [string, "null"]
        provider:
          type: [string, "null"]
        paperless_login_enabled: { type: boolean }
    RuntimeSettings:
      type: object
      additionalProperties: true
    UpdateSettingsRequest:
      type: object
      required: [settings]
      properties:
        settings: { $ref: "#/components/schemas/RuntimeSettings" }
        paperless_token:
          type: [string, "null"]
        provider_secrets:
          type: [object, "null"]
          additionalProperties: { type: string }
    OllamaInstalledModel:
      type: object
      required: [name]
      properties:
        name: { type: string }
        parameter_size:
          type: [string, "null"]
        quantization_level:
          type: [string, "null"]
        size_bytes:
          type: [integer, "null"]
          format: int64
        size_gb:
          type: [number, "null"]
          format: double
        modified_at:
          type: [string, "null"]
        digest:
          type: [string, "null"]
    OllamaInstalledModelsResponse:
      type: object
      required: [provider, models]
      properties:
        provider: { type: string }
        models:
          type: array
          items: { $ref: "#/components/schemas/OllamaInstalledModel" }
    BacklogCounts:
      type: object
      required:
        - total_documents
        - complete
        - missing_ocr
        - missing_tagging
        - missing_title
        - missing_correspondent
        - missing_document_type
        - missing_fields
        - waiting_review
        - failed
        - running
        - never_processed
      properties:
        total_documents: { type: integer, format: int64 }
        complete: { type: integer, format: int64 }
        missing_ocr: { type: integer, format: int64 }
        missing_tagging: { type: integer, format: int64 }
        missing_title: { type: integer, format: int64 }
        missing_correspondent: { type: integer, format: int64 }
        missing_document_type: { type: integer, format: int64 }
        missing_fields: { type: integer, format: int64 }
        waiting_review: { type: integer, format: int64 }
        failed: { type: integer, format: int64 }
        running: { type: integer, format: int64 }
        never_processed: { type: integer, format: int64 }
    DashboardRangeOption:
      type: object
      required: [key, label]
      properties:
        key: { type: string, enum: ["24h", "7d", "30d", "90d", "12m", "all"] }
        label: { type: string }
    DashboardKpis:
      type: object
      required: [completion_rate, open_backlog, failure_rate, review_load, running_jobs, throughput]
      properties:
        completion_rate: { type: number, format: double }
        open_backlog: { type: integer, format: int64 }
        failure_rate: { type: number, format: double }
        review_load: { type: integer, format: int64 }
        running_jobs: { type: integer, format: int64 }
        throughput: { type: integer, format: int64 }
    DashboardComparison:
      type: object
      required: [jobs_created_delta, jobs_succeeded_delta, jobs_failed_delta, open_backlog_delta]
      properties:
        jobs_created_delta: { type: integer, format: int64 }
        jobs_succeeded_delta: { type: integer, format: int64 }
        jobs_failed_delta: { type: integer, format: int64 }
        open_backlog_delta: { type: integer, format: int64 }
    DashboardStageStatus:
      type: object
      required: [stage, complete, pending, failed, waiting_review, running]
      properties:
        stage: { type: string }
        complete: { type: integer, format: int64 }
        pending: { type: integer, format: int64 }
        failed: { type: integer, format: int64 }
        waiting_review: { type: integer, format: int64 }
        running: { type: integer, format: int64 }
    DashboardTimeBucket:
      type: object
      required: [bucket, label, jobs_created, jobs_succeeded, jobs_failed, runs_created, runs_succeeded, runs_failed]
      properties:
        bucket: { type: string, format: date-time }
        label: { type: string }
        jobs_created: { type: integer, format: int64 }
        jobs_succeeded: { type: integer, format: int64 }
        jobs_failed: { type: integer, format: int64 }
        runs_created: { type: integer, format: int64 }
        runs_succeeded: { type: integer, format: int64 }
        runs_failed: { type: integer, format: int64 }
    DashboardBacklogPoint:
      type: object
      required: [bucket, label, total_documents, complete, open_backlog, failed, waiting_review, running]
      properties:
        bucket: { type: string, format: date-time }
        label: { type: string }
        total_documents: { type: integer, format: int64 }
        complete: { type: integer, format: int64 }
        open_backlog: { type: integer, format: int64 }
        failed: { type: integer, format: int64 }
        waiting_review: { type: integer, format: int64 }
        running: { type: integer, format: int64 }
    DashboardStatusCount:
      type: object
      required: [status, count]
      properties:
        status: { type: string }
        count: { type: integer, format: int64 }
    ProviderUsageStats:
      type: object
      required:
        - provider
        - model
        - stage
        - request_count
        - avg_duration_ms
        - p95_duration_ms
        - input_tokens
        - output_tokens
      properties:
        provider: { type: string }
        model: { type: string }
        stage: { type: string }
        request_count: { type: integer, format: int64 }
        avg_duration_ms: { type: number, format: double }
        p95_duration_ms: { type: integer, format: int64 }
        input_tokens: { type: integer, format: int64 }
        output_tokens: { type: integer, format: int64 }
        estimated_cost_usd: { type: [number, "null"], format: double }
    DashboardStats:
      type: object
      required:
        - generated_at
        - selected_range
        - available_ranges
        - kpis
        - comparison
        - stage_status
        - throughput_series
        - backlog_series
        - job_status
        - run_status
        - review_status
        - provider_usage
      properties:
        generated_at: { type: string, format: date-time }
        selected_range: { type: string, enum: ["24h", "7d", "30d", "90d", "12m", "all"] }
        available_ranges:
          type: array
          items: { $ref: "#/components/schemas/DashboardRangeOption" }
        kpis: { $ref: "#/components/schemas/DashboardKpis" }
        comparison: { $ref: "#/components/schemas/DashboardComparison" }
        stage_status:
          type: array
          items: { $ref: "#/components/schemas/DashboardStageStatus" }
        throughput_series:
          type: array
          items: { $ref: "#/components/schemas/DashboardTimeBucket" }
        backlog_series:
          type: array
          items: { $ref: "#/components/schemas/DashboardBacklogPoint" }
        job_status:
          type: array
          items: { $ref: "#/components/schemas/DashboardStatusCount" }
        run_status:
          type: array
          items: { $ref: "#/components/schemas/DashboardStatusCount" }
        review_status:
          type: array
          items: { $ref: "#/components/schemas/DashboardStatusCount" }
        provider_usage:
          type: array
          items: { $ref: "#/components/schemas/ProviderUsageStats" }
    ServiceProcessingStatus:
      type: object
      required: [state, title, description]
      properties:
        state: { type: string, enum: [idle, running, error] }
        title: { type: string }
        description: { type: string }
        last_event_at: { type: [string, "null"], format: date-time }
    DashboardLiveRun:
      type: object
      required: [id, paperless_document_id, mode, status, trigger_tag, stages, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        paperless_document_id: { type: integer }
        mode: { $ref: "#/components/schemas/ProcessingMode" }
        status: { type: string }
        trigger_tag: { type: string }
        stages:
          type: array
          items: { $ref: "#/components/schemas/Stage" }
        started_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    DashboardLiveJob:
      type: object
      required: [id, run_id, paperless_document_id, stage, status, attempts, max_attempts, updated_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        paperless_document_id: { type: integer }
        stage: { $ref: "#/components/schemas/Stage" }
        status: { type: string }
        attempts: { type: integer }
        max_attempts: { type: integer }
        lease_owner: { type: [string, "null"] }
        lease_until: { type: [string, "null"], format: date-time }
        updated_at: { type: string, format: date-time }
        error_message: { type: [string, "null"] }
    DashboardLiveLlmEvent:
      type: object
      required: [id, run_id, stage, provider, model, created_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        job_id: { type: [string, "null"], format: uuid }
        stage: { $ref: "#/components/schemas/Stage" }
        provider: { type: string }
        model: { type: string }
        duration_ms: { type: [integer, "null"] }
        created_at: { type: string, format: date-time }
    DashboardLiveFailure:
      type: object
      required: [id, run_id, paperless_document_id, stage, status, failure_kind, attempts, error_message, updated_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        paperless_document_id: { type: integer }
        stage: { $ref: "#/components/schemas/Stage" }
        status: { type: string }
        failure_kind: { type: string, enum: [failed, retry_scheduled, retry_ready] }
        attempts: { type: integer }
        error_message: { type: string }
        next_attempt_at: { type: [string, "null"], format: date-time }
        updated_at: { type: string, format: date-time }
    DashboardLiveStatus:
      type: object
      required:
        - generated_at
        - workflow_mode
        - autopilot_enabled
        - workflow_safety
        - selector
        - llm
        - paperless
        - active_runs
        - active_jobs
        - recent_llm_events
        - recent_failures
      properties:
        generated_at: { type: string, format: date-time }
        workflow_mode: { $ref: "#/components/schemas/ProcessingMode" }
        autopilot_enabled: { type: boolean }
        workflow_safety: { $ref: "#/components/schemas/WorkflowSafetyStatus" }
        selector: { $ref: "#/components/schemas/ServiceProcessingStatus" }
        next_selector_scan_at:
          type: [string, "null"]
          format: date-time
        llm: { $ref: "#/components/schemas/ServiceProcessingStatus" }
        paperless: { $ref: "#/components/schemas/ServiceProcessingStatus" }
        active_runs:
          type: array
          items: { $ref: "#/components/schemas/DashboardLiveRun" }
        active_jobs:
          type: array
          items: { $ref: "#/components/schemas/DashboardLiveJob" }
        recent_llm_events:
          type: array
          items: { $ref: "#/components/schemas/DashboardLiveLlmEvent" }
        recent_failures:
          type: array
          items: { $ref: "#/components/schemas/DashboardLiveFailure" }
    UpdateWorkflowModeRequest:
      type: object
      required: [mode]
      properties:
        mode: { $ref: "#/components/schemas/ProcessingMode" }
    WorkflowSafetyStatus:
      type: object
      required: [paused, dry_run]
      properties:
        paused: { type: boolean }
        dry_run: { type: boolean }
        hourly_document_limit:
          type: [integer, "null"]
        daily_document_limit:
          type: [integer, "null"]
        hourly_remaining:
          type: [integer, "null"]
        daily_remaining:
          type: [integer, "null"]
    UpdateWorkflowControlsRequest:
      type: object
      additionalProperties: false
      properties:
        paused: { type: boolean }
        dry_run: { type: boolean }
        hourly_document_limit:
          type: [integer, "null"]
        daily_document_limit:
          type: [integer, "null"]
    WorkflowDebugContext:
      type: object
      additionalProperties: true
      properties:
        selector_reason:
          type: [string, "null"]
        workflow_mode:
          oneOf:
            - $ref: "#/components/schemas/ProcessingMode"
            - type: "null"
        workflow_paused:
          type: [boolean, "null"]
        dry_run:
          type: [boolean, "null"]
        prompt_language:
          type: [string, "null"]
        tag_output_language:
          type: [string, "null"]
        detected_language:
          type: [string, "null"]
        detected_language_confidence:
          type: [number, "null"]
          format: float
        detected_language_source:
          type: [string, "null"]
        current_run_status:
          type: [string, "null"]
        last_error:
          type: [string, "null"]
        next_required_stage:
          type: [string, "null"]
    DashboardResponse:
      type: object
      required: [counts, stats]
      properties:
        counts: { $ref: "#/components/schemas/BacklogCounts" }
        stats: { $ref: "#/components/schemas/DashboardStats" }
    DocumentInventoryItem:
      type: object
      additionalProperties: true
      properties:
        debug_context:
          oneOf:
            - $ref: "#/components/schemas/WorkflowDebugContext"
            - type: "null"
    StandardMetadataSuggestion:
      type: object
      additionalProperties: true
      properties:
        field:
          type: string
          enum: [correspondent, document_type, document_date]
        suggested_name:
          type: [string, "null"]
        suggested_date:
          type: [string, "null"]
          format: date
        current_correspondent:
          type: [integer, "null"]
        current_document_type:
          type: [integer, "null"]
        current_date:
          type: [string, "null"]
        confidence:
          type: [number, "null"]
          format: float
        evidence:
          type: [string, "null"]
    DocumentPatch:
      type: object
      additionalProperties: false
      properties:
        content: { type: string }
        title: { type: string }
        tags:
          type: array
          items: { type: integer }
        correspondent:
          type: [integer, "null"]
        document_type:
          type: [integer, "null"]
        created:
          type: string
          format: date
        custom_fields: true
        standard_metadata:
          $ref: "#/components/schemas/StandardMetadataSuggestion"
    ReviewItem:
      type: object
      additionalProperties: true
      required: [id, paperless_document_id, stage, status, suggested_patch, created_at]
      properties:
        id: { type: string, format: uuid }
        paperless_document_id: { type: integer }
        stage: { $ref: "#/components/schemas/Stage" }
        status: { type: string }
        suggested_patch:
          $ref: "#/components/schemas/DocumentPatch"
        edited_patch:
          oneOf:
            - $ref: "#/components/schemas/DocumentPatch"
            - type: "null"
        validation_warnings: true
        debug_context:
          oneOf:
            - $ref: "#/components/schemas/WorkflowDebugContext"
            - type: "null"
        created_at: { type: string, format: date-time }
    AuditEvent:
      type: object
      additionalProperties: true
    Prompt:
      type: object
      required: [id, stage, name, version, content, active, created_at]
      properties:
        id: { type: string, format: uuid }
        stage: { $ref: "#/components/schemas/Stage" }
        name: { type: string }
        version: { type: integer }
        content: { type: string }
        output_schema: true
        active: { type: boolean }
        created_at: { type: string, format: date-time }
    PromptUsage:
      type: object
      required: [prompt_id, run_count, job_count, avg_duration_ms]
      properties:
        prompt_id: { type: string, format: uuid }
        run_count: { type: integer, format: int64 }
        job_count: { type: integer, format: int64 }
        last_used_at:
          type: [string, "null"]
          format: date-time
        avg_duration_ms: { type: number, format: double }
        last_provider:
          type: [string, "null"]
        last_model:
          type: [string, "null"]
    TestPromptRequest:
      type: object
      required: [stage, content]
      properties:
        stage: { $ref: "#/components/schemas/Stage" }
        content: { type: string }
        sample_text:
          type: [string, "null"]
        paperless_document_id:
          type: [integer, "null"]
        provider_name:
          type: [string, "null"]
        model:
          type: [string, "null"]
    TestPromptResponse:
      type: object
      required: [provider, model, stage, raw_text, validation_errors, warnings, duration_ms]
      properties:
        provider: { type: string }
        model: { type: string }
        stage: { $ref: "#/components/schemas/Stage" }
        raw_text: { type: string }
        parsed: true
        validation_errors:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }
        duration_ms: { type: integer, format: int32 }
    DocumentChatSource:
      type: object
      required: [paperless_document_id, snippet, score, source_kind]
      properties:
        paperless_document_id: { type: integer }
        title:
          type: [string, "null"]
        snippet: { type: string }
        score: { type: number, format: double }
        source_kind: { type: string }
    DocumentChatSession:
      type: object
      required: [id, title, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        created_by:
          type: [string, "null"]
          format: uuid
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    DocumentChatMessage:
      type: object
      required: [id, session_id, role, content, sources, created_at]
      properties:
        id: { type: string, format: uuid }
        session_id: { type: string, format: uuid }
        role: { type: string, enum: [user, assistant, system] }
        content: { type: string }
        provider:
          type: [string, "null"]
        model:
          type: [string, "null"]
        metadata: true
        sources:
          type: array
          items: { $ref: "#/components/schemas/DocumentChatSource" }
        created_at: { type: string, format: date-time }
    CreateDocumentChatSessionRequest:
      type: object
      properties:
        title: { type: string }
    PostDocumentChatMessageRequest:
      type: object
      required: [question]
      properties:
        question: { type: string, minLength: 3, maxLength: 4000 }
        document_ids:
          type: [array, "null"]
          maxItems: 50
          items: { type: integer }
        max_sources:
          type: integer
          minimum: 1
          maximum: 10
    PostDocumentChatMessageResponse:
      type: object
      required: [session_id, user_message_id, assistant_message_id, answer, sources]
      properties:
        session_id: { type: string, format: uuid }
        user_message_id: { type: string, format: uuid }
        assistant_message_id: { type: string, format: uuid }
        answer: { type: string }
        sources:
          type: array
          items: { $ref: "#/components/schemas/DocumentChatSource" }
    Session:
      type: object
      additionalProperties: true
    User:
      type: object
      additionalProperties: true
paths:
  /healthz:
    get:
      security: []
      responses:
        "200":
          description: Healthy
          content:
            text/plain:
              schema: { type: string }
  /readyz:
    get:
      security: []
      responses:
        "200":
          description: Ready
          content:
            text/plain:
              schema: { type: string }
  /metrics:
    get:
      security: []
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema: { type: string }
  /api/auth/login:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
  /api/auth/paperless-login:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in through the optional Paperless login bridge
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
  /api/auth/oidc/config:
    get:
      security: []
      responses:
        "200":
          description: OIDC login availability
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OidcConfigResponse" }
  /api/auth/oidc/login:
    get:
      security: []
      parameters:
        - name: return_to
          in: query
          schema: { type: string }
      responses:
        "307": { description: Redirect to OIDC provider }
  /api/auth/oidc/callback:
    get:
      security: []
      parameters:
        - name: code
          in: query
          schema: { type: string }
        - name: state
          in: query
          schema: { type: string }
        - name: error
          in: query
          schema: { type: string }
        - name: error_description
          in: query
          schema: { type: string }
      responses:
        "303": { description: Login completed and session cookies issued }
  /api/auth/logout:
    post:
      responses:
        "200": { description: Logged out }
  /api/auth/me:
    get:
      responses:
        "200":
          description: Current principal
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
  /api/auth/change-password:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string, format: password }
                new_password: { type: string, format: password }
      responses:
        "200": { description: Password changed and sessions revoked }
  /api/auth/sessions:
    get:
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Session" }
  /api/auth/sessions/{id}/revoke:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Session revoked }
  /api/settings:
    get:
      responses:
        "200":
          description: Runtime settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeSettings" }
    put:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSettingsRequest" }
