openapi: 3.1.0
info:
  title: Paperless Archivist API
  version: 1.13.4
servers:
  - url: /
security:
  - cookieSession: []
  - bearerToken: []
components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: pa_session
    bearerToken:
      type: http
      scheme: bearer
  schemas:
    Role:
      type: string
      enum: [viewer, reviewer, operator, admin, auditor]
    Stage:
      type: string
      enum: [ocr, metadata, apply]
    ProcessingMode:
      type: string
      enum: [manual_review, auto_select_review, full_auto]
    AiProviderKind:
      type: string
      enum: [ollama, openai, anthropic, openai_compatible]
    AiProviderSettings:
      type: object
      required: [name, kind, base_url, enabled]
      properties:
        name: { type: string }
        kind: { $ref: "#/components/schemas/AiProviderKind" }
        base_url: { type: string }
        default_text_model: { type: [string, "null"] }
        default_vision_model: { type: [string, "null"] }
        cost_per_1m_input_tokens_usd: { type: [number, "null"], format: double }
        cost_per_1m_output_tokens_usd: { type: [number, "null"], format: double }
        secret_id: { type: [string, "null"], format: uuid }
        enabled: { type: boolean }
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }
    MeResponse:
      type: object
      required: [username, roles, permissions]
      properties:
        username: { type: string }
        roles:
          type: array
          items: { $ref: "#/components/schemas/Role" }
        permissions: { $ref: "#/components/schemas/PermissionFlags" }
        csrf_token:
          type: [string, "null"]
    PermissionFlags:
      type: object
      required:
        - read_dashboard
        - read_runs
        - write_runs
        - read_inventory
        - write_batches
        - use_chat
        - read_reviews
        - write_reviews
        - read_settings
        - write_settings
        - manage_users
        - read_audit
      properties:
        read_dashboard: { type: boolean }
        read_runs: { type: boolean }
        write_runs: { type: boolean }
        read_inventory: { type: boolean }
        write_batches: { type: boolean }
        use_chat: { type: boolean }
        read_reviews: { type: boolean }
        write_reviews: { type: boolean }
        read_settings: { type: boolean }
        write_settings: { type: boolean }
        manage_users: { type: boolean }
        read_audit: { type: boolean }
    OidcConfigResponse:
      type: object
      required: [enabled]
      properties:
        enabled: { type: boolean }
        login_url:
          type: [string, "null"]
        provider:
          type: [string, "null"]
        paperless_login_enabled: { type: boolean }
    RuntimeSettings:
      type: object
      additionalProperties: true
    UpdateSettingsRequest:
      type: object
      required: [settings]
      properties:
        settings: { $ref: "#/components/schemas/RuntimeSettings" }
        paperless_token:
          type: [string, "null"]
        notification_webhook_url:
          type: [string, "null"]
        provider_secrets:
          type: [object, "null"]
          additionalProperties: { type: string }
    OllamaInstalledModel:
      type: object
      required: [name]
      properties:
        name: { type: string }
        parameter_size:
          type: [string, "null"]
        quantization_level:
          type: [string, "null"]
        size_bytes:
          type: [integer, "null"]
          format: int64
        size_gb:
          type: [number, "null"]
          format: double
        modified_at:
          type: [string, "null"]
        digest:
          type: [string, "null"]
    OllamaInstalledModelsResponse:
      type: object
      required: [provider, models]
      properties:
        provider: { type: string }
        models:
          type: array
          items: { $ref: "#/components/schemas/OllamaInstalledModel" }
    PaperlessSyncResponse:
      type: object
      additionalProperties: true
      properties:
        archive: { type: string }
        mode: { type: string, enum: [full, full_initial, delta, full_after_delta_error] }
        delta_cursor:
          type: [string, "null"]
          format: date-time
        synced_documents: { type: integer }
    PaperlessConsistencyMismatch:
      type: object
      required: [paperless_document_id, fields]
      properties:
        paperless_document_id: { type: integer }
        fields:
          type: array
          items: { type: string }
    PaperlessConsistencyResponse:
      type: object
      required: [ok, documents_checked, missing_local, stale_local, mismatches]
      properties:
        ok: { type: boolean }
        documents_checked: { type: integer }
        missing_local:
          type: array
          items: { type: integer }
        stale_local:
          type: array
          items: { type: integer }
        mismatches:
          type: array
          items: { $ref: "#/components/schemas/PaperlessConsistencyMismatch" }
    ReconcileCompletionTagsRequest:
      type: object
      additionalProperties: false
      properties:
        dry_run: { type: boolean, default: true }
        document_ids:
          type: array
          items: { type: integer }
    CompletionTagReconcilePlan:
      type: object
      required: [paperless_document_id, add]
      properties:
        paperless_document_id: { type: integer }
        add:
          type: array
          items: { type: string }
    ReconcileCompletionTagsResponse:
      type: object
      required: [dry_run, planned, applied]
      properties:
        dry_run: { type: boolean }
        planned:
          type: array
          items: { $ref: "#/components/schemas/CompletionTagReconcilePlan" }
        applied:
          type: array
          items: { type: integer }
    BacklogCounts:
      type: object
      required:
        - total_documents
        - complete
        - missing_ocr
        - waiting_review
        - failed
        - running
        - never_processed
      properties:
        total_documents: { type: integer, format: int64 }
        complete: { type: integer, format: int64 }
        missing_ocr: { type: integer, format: int64 }
        waiting_review: { type: integer, format: int64 }
        failed:
          type: integer
          format: int64
          description: >-
            Documents whose ocr_status or metadata_status is 'failed'. The six
            per-field missing_* counters were removed with the fossil
            per-field status columns (migration 0039).
        running: { type: integer, format: int64 }
        never_processed: { type: integer, format: int64 }
    DashboardRangeOption:
      type: object
      required: [key, label]
      properties:
        key: { type: string, enum: ["24h", "7d", "30d", "90d", "12m", "all"] }
        label: { type: string }
    DashboardKpis:
      type: object
      required:
        - completion_rate
        - open_backlog
        - failure_rate
        - review_load
        - running_jobs
        - throughput
        - cost_in_range_usd
        - mttc_seconds
        - p95_stage_duration_ms
      properties:
        completion_rate: { type: number, format: double }
        open_backlog: { type: integer, format: int64 }
        failure_rate: { type: number, format: double }
        review_load: { type: integer, format: int64 }
        running_jobs: { type: integer, format: int64 }
        throughput: { type: integer, format: int64 }
        cost_in_range_usd: { type: [number, "null"], format: double }
        mttc_seconds: { type: [number, "null"], format: double }
        p95_stage_duration_ms: { type: [integer, "null"], format: int64 }
    DashboardComparison:
      type: object
      required: [jobs_created_delta, jobs_succeeded_delta, jobs_failed_delta, open_backlog_delta]
      properties:
        jobs_created_delta: { type: integer, format: int64 }
        jobs_succeeded_delta: { type: integer, format: int64 }
        jobs_failed_delta: { type: integer, format: int64 }
        open_backlog_delta: { type: integer, format: int64 }
    DashboardStageStatus:
      type: object
      required: [stage, complete, pending, failed, waiting_review, running]
      properties:
        stage: { type: string }
        complete: { type: integer, format: int64 }
        pending: { type: integer, format: int64 }
        failed: { type: integer, format: int64 }
        waiting_review: { type: integer, format: int64 }
        running: { type: integer, format: int64 }
    DashboardTimeBucket:
      type: object
      required: [bucket, label, jobs_created, jobs_succeeded, jobs_failed, runs_created, runs_succeeded, runs_failed]
      properties:
        bucket: { type: string, format: date-time }
        label: { type: string }
        jobs_created: { type: integer, format: int64 }
        jobs_succeeded: { type: integer, format: int64 }
        jobs_failed: { type: integer, format: int64 }
        runs_created: { type: integer, format: int64 }
        runs_succeeded: { type: integer, format: int64 }
        runs_failed: { type: integer, format: int64 }
    DashboardBacklogPoint:
      type: object
      required: [bucket, label, total_documents, complete, open_backlog, failed, waiting_review, running]
      properties:
        bucket: { type: string, format: date-time }
        label: { type: string }
        total_documents: { type: integer, format: int64 }
        complete: { type: integer, format: int64 }
        open_backlog: { type: integer, format: int64 }
        failed: { type: integer, format: int64 }
        waiting_review: { type: integer, format: int64 }
        running: { type: integer, format: int64 }
    DashboardStatusCount:
      type: object
      required: [status, count]
      properties:
        status: { type: string }
        count: { type: integer, format: int64 }
    ProviderUsageStats:
      type: object
      required:
        - provider
        - model
        - stage
        - request_count
        - avg_duration_ms
        - p95_duration_ms
        - input_tokens
        - output_tokens
        - feedback_count
        - positive_feedback
        - negative_feedback
        - acceptance_rate
        - latency_history
      properties:
        provider: { type: string }
        model: { type: string }
        stage: { type: string }
        request_count: { type: integer, format: int64 }
        avg_duration_ms: { type: number, format: double }
        p95_duration_ms: { type: integer, format: int64 }
        input_tokens: { type: integer, format: int64 }
        output_tokens: { type: integer, format: int64 }
        estimated_cost_usd: { type: [number, "null"], format: double }
        feedback_count: { type: integer, format: int64 }
        positive_feedback: { type: integer, format: int64 }
        negative_feedback: { type: integer, format: int64 }
        acceptance_rate: { type: [number, "null"], format: double }
        latency_history:
          type: array
          items: { type: [number, "null"], format: double }
    QualityStats:
      type: object
      required:
        - review_decisions
        - review_approved
        - review_edited
        - review_rejected
        - acceptance_rate
        - uncertainty_reviews
        - validation_warning_reviews
      properties:
        review_decisions: { type: integer, format: int64 }
        review_approved: { type: integer, format: int64 }
        review_edited: { type: integer, format: int64 }
        review_rejected: { type: integer, format: int64 }
        acceptance_rate: { type: [number, "null"], format: double }
        uncertainty_reviews: { type: integer, format: int64 }
        validation_warning_reviews: { type: integer, format: int64 }
    DashboardCostBucket:
      type: object
      required: [bucket, label, cost_usd, request_count, input_tokens, output_tokens]
      properties:
        bucket: { type: string, format: date-time }
        label: { type: string }
        cost_usd: { type: [number, "null"], format: double }
        request_count: { type: integer, format: int64 }
        input_tokens: { type: integer, format: int64 }
        output_tokens: { type: integer, format: int64 }
    DashboardProviderCostSummary:
      type: object
      required:
        - provider
        - model
        - cost_usd
        - request_count
        - input_tokens
        - output_tokens
        - sparkline
      properties:
        provider: { type: string }
        model: { type: string }
        cost_usd: { type: [number, "null"], format: double }
        request_count: { type: integer, format: int64 }
        input_tokens: { type: integer, format: int64 }
        output_tokens: { type: integer, format: int64 }
        sparkline:
          type: array
          items: { type: [number, "null"], format: double }
    DashboardStats:
      type: object
      required:
        - generated_at
        - selected_range
        - available_ranges
        - kpis
        - comparison
        - stage_status
        - throughput_series
        - backlog_series
        - job_status
        - run_status
        - review_status
        - provider_usage
        - quality
        - cost_series
        - cost_breakdown_by_provider
      properties:
        generated_at: { type: string, format: date-time }
        selected_range: { type: string, enum: ["24h", "7d", "30d", "90d", "12m", "all"] }
        available_ranges:
          type: array
          items: { $ref: "#/components/schemas/DashboardRangeOption" }
        kpis: { $ref: "#/components/schemas/DashboardKpis" }
        comparison: { $ref: "#/components/schemas/DashboardComparison" }
        stage_status:
          type: array
          items: { $ref: "#/components/schemas/DashboardStageStatus" }
        throughput_series:
          type: array
          items: { $ref: "#/components/schemas/DashboardTimeBucket" }
        backlog_series:
          type: array
          items: { $ref: "#/components/schemas/DashboardBacklogPoint" }
        job_status:
          type: array
          items: { $ref: "#/components/schemas/DashboardStatusCount" }
        run_status:
          type: array
          items: { $ref: "#/components/schemas/DashboardStatusCount" }
        review_status:
          type: array
          items: { $ref: "#/components/schemas/DashboardStatusCount" }
        provider_usage:
          type: array
          items: { $ref: "#/components/schemas/ProviderUsageStats" }
        quality: { $ref: "#/components/schemas/QualityStats" }
        cost_series:
          type: array
          items: { $ref: "#/components/schemas/DashboardCostBucket" }
        cost_breakdown_by_provider:
          type: array
          items: { $ref: "#/components/schemas/DashboardProviderCostSummary" }
    ServiceProcessingStatus:
      type: object
      required: [state, title, description]
      properties:
        state: { type: string, enum: [idle, running, error] }
        title: { type: string }
        description: { type: string }
        last_event_at: { type: [string, "null"], format: date-time }
    DashboardLiveRun:
      type: object
      required: [id, trace_id, paperless_document_id, mode, status, trigger_tag, stages, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        trace_id: { type: string, format: uuid }
        paperless_document_id: { type: integer }
        mode: { $ref: "#/components/schemas/ProcessingMode" }
        status: { type: string }
        trigger_tag: { type: string }
        stages:
          type: array
          items: { $ref: "#/components/schemas/Stage" }
        started_at: { type: [string, "null"], format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    DashboardLiveJob:
      type: object
      required: [id, run_id, trace_id, paperless_document_id, stage, status, attempts, max_attempts, updated_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        trace_id: { type: string, format: uuid }
        paperless_document_id: { type: integer }
        stage: { $ref: "#/components/schemas/Stage" }
        status: { type: string }
        attempts: { type: integer }
        max_attempts: { type: integer }
        lease_owner: { type: [string, "null"] }
        lease_until: { type: [string, "null"], format: date-time }
        updated_at: { type: string, format: date-time }
        error_message: { type: [string, "null"] }
    DashboardLiveLlmEvent:
      type: object
      required: [id, run_id, stage, provider, model, created_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        job_id: { type: [string, "null"], format: uuid }
        stage: { $ref: "#/components/schemas/Stage" }
        provider: { type: string }
        model: { type: string }
        duration_ms: { type: [integer, "null"] }
        created_at: { type: string, format: date-time }
    DashboardLiveFailure:
      type: object
      required: [id, run_id, paperless_document_id, stage, status, failure_kind, attempts, error_message, updated_at]
      properties:
        id: { type: string, format: uuid }
        run_id: { type: string, format: uuid }
        paperless_document_id: { type: integer }
        stage: { $ref: "#/components/schemas/Stage" }
        status: { type: string }
        failure_kind: { type: string, enum: [failed, retry_scheduled, retry_ready] }
        attempts: { type: integer }
        error_message: { type: string }
        next_attempt_at: { type: [string, "null"], format: date-time }
        updated_at: { type: string, format: date-time }
    NeedsAttentionItem:
      type: object
      required: [kind, severity, title, description]
      properties:
        kind: { type: string }
        severity: { type: string, enum: [info, warning, critical] }
        title: { type: string }
        description: { type: string }
        action_key: { type: [string, "null"] }
        count: { type: [integer, "null"], format: int64 }
    DashboardLiveStatus:
      type: object
      required:
        - generated_at
        - workflow_mode
        - autopilot_enabled
        - workflow_safety
        - selector
        - llm
        - paperless
        - active_runs
        - active_jobs
        - recent_llm_events
        - recent_failures
        - needs_attention
      properties:
        generated_at: { type: string, format: date-time }
        workflow_mode: { $ref: "#/components/schemas/ProcessingMode" }
        autopilot_enabled: { type: boolean }
        workflow_safety: { $ref: "#/components/schemas/WorkflowSafetyStatus" }
        selector: { $ref: "#/components/schemas/ServiceProcessingStatus" }
        next_selector_scan_at:
          type: [string, "null"]
          format: date-time
        llm: { $ref: "#/components/schemas/ServiceProcessingStatus" }
        paperless: { $ref: "#/components/schemas/ServiceProcessingStatus" }
        active_runs:
          type: array
          items: { $ref: "#/components/schemas/DashboardLiveRun" }
        active_jobs:
          type: array
          items: { $ref: "#/components/schemas/DashboardLiveJob" }
        recent_llm_events:
          type: array
          items: { $ref: "#/components/schemas/DashboardLiveLlmEvent" }
        recent_failures:
          type: array
          items: { $ref: "#/components/schemas/DashboardLiveFailure" }
        needs_attention:
          type: array
          items: { $ref: "#/components/schemas/NeedsAttentionItem" }
    UpdateWorkflowModeRequest:
      type: object
      required: [mode]
      properties:
        mode: { $ref: "#/components/schemas/ProcessingMode" }
    WorkflowSafetyStatus:
      type: object
      required: [paused, dry_run]
      properties:
        paused: { type: boolean }
        dry_run: { type: boolean }
        hourly_document_limit:
          type: [integer, "null"]
        daily_document_limit:
          type: [integer, "null"]
        hourly_remaining:
          type: [integer, "null"]
        daily_remaining:
          type: [integer, "null"]
    UpdateWorkflowControlsRequest:
      type: object
      additionalProperties: false
      properties:
        paused: { type: boolean }
        dry_run: { type: boolean }
        hourly_document_limit:
          type: [integer, "null"]
        daily_document_limit:
          type: [integer, "null"]
    WorkflowDebugContext:
      type: object
      additionalProperties: true
      properties:
        selector_reason:
          type: [string, "null"]
        workflow_mode:
          oneOf:
            - $ref: "#/components/schemas/ProcessingMode"
            - type: "null"
        workflow_paused:
          type: [boolean, "null"]
        dry_run:
          type: [boolean, "null"]
        prompt_language:
          type: [string, "null"]
        tag_output_language:
          type: [string, "null"]
        detected_language:
          type: [string, "null"]
        detected_language_confidence:
          type: [number, "null"]
          format: float
        detected_language_source:
          type: [string, "null"]
        current_run_status:
          type: [string, "null"]
        last_error:
          type: [string, "null"]
        next_required_stage:
          type: [string, "null"]
    DashboardResponse:
      type: object
      required: [counts, stats]
      properties:
        counts: { $ref: "#/components/schemas/BacklogCounts" }
        stats: { $ref: "#/components/schemas/DashboardStats" }
    StatisticsSummary:
      type: object
      required: [request_count, input_tokens, output_tokens, jobs_succeeded, jobs_failed, jobs_cancelled]
      properties:
        request_count: { type: integer, format: int64 }
        input_tokens: { type: integer, format: int64 }
        output_tokens: { type: integer, format: int64 }
        avg_duration_ms: { type: [number, "null"], format: double }
        # Null unless at least one provider has token costs configured.
        estimated_cost_usd: { type: [number, "null"], format: double }
        jobs_succeeded: { type: integer, format: int64 }
        jobs_failed: { type: integer, format: int64 }
        jobs_cancelled: { type: integer, format: int64 }
    StatisticsTimePoint:
      type: object
      required: [bucket, request_count, input_tokens, output_tokens]
      properties:
        bucket: { type: string, format: date-time }
        request_count: { type: integer, format: int64 }
        input_tokens: { type: integer, format: int64 }
        output_tokens: { type: integer, format: int64 }
        avg_duration_ms: { type: [number, "null"], format: double }
    StatisticsThroughputPoint:
      type: object
      required: [bucket, succeeded, failed, cancelled]
      properties:
        bucket: { type: string, format: date-time }
        succeeded: { type: integer, format: int64 }
        failed: { type: integer, format: int64 }
        cancelled: { type: integer, format: int64 }
    StatisticsBreakdownRow:
      type: object
      required: [request_count, input_tokens, output_tokens]
      properties:
        # Exactly one of provider/model/stage is present, matching the
        # breakdown list the row belongs to.
        provider: { type: string }
        model: { type: string }
        stage: { type: string }
        request_count: { type: integer, format: int64 }
        input_tokens: { type: integer, format: int64 }
        output_tokens: { type: integer, format: int64 }
        avg_duration_ms: { type: [number, "null"], format: double }
        # Only computed for the by-provider breakdown (costs are configured
        # per provider); always null in by_model / by_stage rows.
        estimated_cost_usd: { type: [number, "null"], format: double }
    StatisticsResponse:
      type: object
      required: [from, to, bucket, summary, time_series, throughput_series, by_provider, by_model, by_stage]
      properties:
        from: { type: string, format: date-time }
        to: { type: string, format: date-time }
        bucket: { type: string, enum: ["hour", "day", "week", "month"] }
        summary: { $ref: "#/components/schemas/StatisticsSummary" }
        # Both series share one zero-filled bucket axis: every bucket of the
        # resolved range appears (empty ones with zero counts), except for
        # ranges so large that zero-filling is skipped and only non-empty
        # buckets are returned.
        time_series:
          type: array
          items: { $ref: "#/components/schemas/StatisticsTimePoint" }
        throughput_series:
          type: array
          items: { $ref: "#/components/schemas/StatisticsThroughputPoint" }
        by_provider:
          type: array
          items: { $ref: "#/components/schemas/StatisticsBreakdownRow" }
        by_model:
          type: array
          items: { $ref: "#/components/schemas/StatisticsBreakdownRow" }
        by_stage:
          type: array
          items: { $ref: "#/components/schemas/StatisticsBreakdownRow" }
    DocumentInventoryItem:
      type: object
      additionalProperties: true
      properties:
        debug_context:
          oneOf:
            - $ref: "#/components/schemas/WorkflowDebugContext"
            - type: "null"
    StandardMetadataSuggestion:
      type: object
      additionalProperties: true
      properties:
        field:
          type: string
          enum: [correspondent, document_type, document_date]
        suggested_name:
          type: [string, "null"]
        suggested_date:
          type: [string, "null"]
          format: date
        current_correspondent:
          type: [integer, "null"]
        current_document_type:
          type: [integer, "null"]
        current_date:
          type: [string, "null"]
        confidence:
          type: [number, "null"]
          format: float
        evidence:
          type: [string, "null"]
    DocumentPatch:
      type: object
      additionalProperties: false
      properties:
        content: { type: string }
        title: { type: string }
        tags:
          type: array
          items: { type: integer }
        correspondent:
          type: [integer, "null"]
        document_type:
          type: [integer, "null"]
        created:
          type: string
          format: date
        custom_fields: true
        standard_metadata:
          $ref: "#/components/schemas/StandardMetadataSuggestion"
    ReviewItem:
      type: object
      additionalProperties: true
      required: [id, paperless_document_id, stage, status, suggested_patch, created_at]
      properties:
        id: { type: string, format: uuid }
        paperless_document_id: { type: integer }
        stage: { $ref: "#/components/schemas/Stage" }
        status: { type: string }
        suggested_patch:
          $ref: "#/components/schemas/DocumentPatch"
        edited_patch:
          oneOf:
            - $ref: "#/components/schemas/DocumentPatch"
            - type: "null"
        validation_warnings: true
        debug_context:
          oneOf:
            - $ref: "#/components/schemas/WorkflowDebugContext"
            - type: "null"
        paperless_title:
          type: [string, "null"]
          description: >-
            Cached Paperless title from the document_inventory, surfaced so the
            review UI can show the actual document title instead of falling
            back to "Document {id}" when the suggested_patch has no title.
        created_at: { type: string, format: date-time }
    AuditEvent:
      type: object
      additionalProperties: true
    AuditIntegrityReport:
      type: object
      required: [ok, checked_events, legacy_events]
      properties:
        ok: { type: boolean }
        checked_events: { type: integer, format: int64 }
        legacy_events: { type: integer, format: int64 }
        latest_event_hash: { type: [string, "null"] }
        broken_event_id: { type: [string, "null"], format: uuid }
        broken_reason: { type: [string, "null"] }
    RetentionResult:
      type: object
      required:
        [
          audit_events_deleted,
          ai_artifacts_deleted,
          ocr_page_cache_deleted,
          pipeline_runs_deleted,
        ]
      properties:
        audit_events_deleted: { type: integer, format: int64 }
        ai_artifacts_deleted: { type: integer, format: int64 }
        ocr_page_cache_deleted: { type: integer, format: int64 }
        pipeline_runs_deleted:
          type: integer
          format: int64
          description: >-
            Terminal pipeline runs pruned past runs_retention_days; their jobs
            and AI artifacts are deleted with them via CASCADE.
    RecoveryCandidate:
      type: object
      additionalProperties: false
      required: [run_id, paperless_document_id, status, updated_at, reason]
      properties:
        run_id: { type: string, format: uuid }
        job_id: { type: [string, "null"], format: uuid }
        paperless_document_id: { type: integer }
        stage:
          oneOf:
            - $ref: "#/components/schemas/Stage"
            - type: "null"
        status: { type: string }
        lease_owner: { type: [string, "null"] }
        lease_until: { type: [string, "null"], format: date-time }
        updated_at: { type: string, format: date-time }
        reason: { type: string }
    RecoverySummary:
      type: object
      additionalProperties: false
      required: [stale_leases_requeued, stuck_runs_failed, stuck_runs_completed]
      properties:
        stale_leases_requeued: { type: integer }
        stuck_runs_failed: { type: integer }
        stuck_runs_completed: { type: integer }
    RecoveryRequest:
      type: object
      additionalProperties: false
      properties:
        older_than_seconds: { type: integer, minimum: 60, maximum: 86400 }
    RecoveryStatusResponse:
      type: object
      required: [older_than_seconds, items]
      properties:
        older_than_seconds: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/RecoveryCandidate" }
    RecoveryActionResponse:
      type: object
      required: [older_than_seconds, summary]
      properties:
        older_than_seconds: { type: integer }
        summary: { $ref: "#/components/schemas/RecoverySummary" }
    Prompt:
      type: object
      required: [id, stage, name, version, content, active, created_at]
      properties:
        id: { type: string, format: uuid }
        stage: { $ref: "#/components/schemas/Stage" }
        name: { type: string }
        version: { type: integer }
        content: { type: string }
        output_schema: true
        active: { type: boolean }
        created_at: { type: string, format: date-time }
    PromptUsage:
      type: object
      required: [prompt_id, run_count, job_count, avg_duration_ms]
      properties:
        prompt_id: { type: string, format: uuid }
        run_count: { type: integer, format: int64 }
        job_count: { type: integer, format: int64 }
        last_used_at:
          type: [string, "null"]
          format: date-time
        avg_duration_ms: { type: number, format: double }
        last_provider:
          type: [string, "null"]
        last_model:
          type: [string, "null"]
    TestPromptRequest:
      type: object
      required: [stage, content]
      properties:
        stage: { $ref: "#/components/schemas/Stage" }
        content: { type: string }
        sample_text:
          type: [string, "null"]
        paperless_document_id:
          type: [integer, "null"]
        provider_name:
          type: [string, "null"]
        model:
          type: [string, "null"]
    TestPromptResponse:
      type: object
      required: [provider, model, stage, raw_text, validation_errors, warnings, duration_ms]
      properties:
        provider: { type: string }
        model: { type: string }
        stage: { $ref: "#/components/schemas/Stage" }
        raw_text: { type: string }
        parsed: true
        validation_errors:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }
        duration_ms: { type: integer, format: int32 }
    DocumentChatSource:
      type: object
      required: [paperless_document_id, snippet, score, source_kind]
      properties:
        paperless_document_id: { type: integer }
        title:
          type: [string, "null"]
        snippet: { type: string }
        score: { type: number, format: double }
        source_kind: { type: string }
    AiRuntimeHints:
      type: object
      required: [provider, reachable]
      properties:
        provider: { type: string }
        reachable: { type: boolean }
        version: { type: [string, "null"] }
        loaded_models:
          type: array
          items: { $ref: "#/components/schemas/AiLoadedModel" }
        # Env-only on the Ollama pod, not surfaced via Ollamas HTTP API.
        # Always null; the `hint` string explains where to set them.
        num_parallel: { type: [integer, "null"] }
        max_loaded_models: { type: [integer, "null"] }
        keep_alive: { type: [string, "null"] }
        hint: { type: [string, "null"] }
    AiLoadedModel:
      type: object
      required: [name]
      properties:
        name: { type: string }
        size_vram_bytes: { type: [integer, "null"], format: int64 }
        # Optional: when the model was last accessed (epoch seconds).
        last_used_at: { type: [string, "null"], format: date-time }
    MetadataTrace:
      type: object
      required: [paperless_document_id, current_state, latest_run]
      properties:
        paperless_document_id: { type: integer }
        current_state:
          type: object
          required: [tags]
          properties:
            title: { type: [string, "null"] }
            correspondent: { type: [string, "null"] }
            document_type: { type: [string, "null"] }
            document_date: { type: [string, "null"] }
            tags:
              type: array
              items: { type: string }
        latest_run:
          $ref: "#/components/schemas/MetadataTraceRun"
    MetadataTraceRun:
      type: object
      required: [run_id, stage, status, created_at, per_field_outcomes]
      properties:
        run_id: { type: string, format: uuid }
        stage: { type: string }
        status: { type: string }
        created_at: { type: string, format: date-time }
        applied_at: { type: [string, "null"], format: date-time }
        model: { type: [string, "null"] }
        provider: { type: [string, "null"] }
        llm_suggestion:
          # The raw `ai_artifacts.normalized_output` payload. Free-form because
          # its inner shape evolves with prompt changes — frontends should treat
          # this as best-effort debug content.
          nullable: true
          type: object
          additionalProperties: true
        per_field_outcomes:
          type: array
          items: { $ref: "#/components/schemas/MetadataFieldOutcome" }
    MetadataFieldOutcome:
      type: object
      required: [field, outcome, warnings]
      properties:
        field:
          type: string
          enum: [title, correspondent, document_type, document_date, tags, fields]
        outcome:
          type: string
          enum: [applied, review, skipped, dropped, rejected]
        # Free-form because each field has its own value type (string, array,
        # object). The frontend renders by field name.
        value: true
        confidence: { type: [number, "null"], format: float }
        reason:
          type: [string, "null"]
          # Canonical machine strings — see docs/METADATA_TRACE_CONTRACT.md.
          # Frontends translate these via inventory.diagnose.reason.* keys.
        warnings:
          type: array
          items:
            type: object
            additionalProperties: true
    DocumentChatSession:
      type: object
      required: [id, title, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        created_by:
          type: [string, "null"]
          format: uuid
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    DocumentChatMessage:
      type: object
      required: [id, session_id, role, content, sources, created_at]
      properties:
        id: { type: string, format: uuid }
        session_id: { type: string, format: uuid }
        role: { type: string, enum: [user, assistant, system] }
        content: { type: string }
        provider:
          type: [string, "null"]
        model:
          type: [string, "null"]
        metadata: true
        sources:
          type: array
          items: { $ref: "#/components/schemas/DocumentChatSource" }
        created_at: { type: string, format: date-time }
    CreateDocumentChatSessionRequest:
      type: object
      properties:
        title: { type: string }
    PostDocumentChatMessageRequest:
      type: object
      required: [question]
      properties:
        question: { type: string, minLength: 3, maxLength: 4000 }
        document_ids:
          type: [array, "null"]
          maxItems: 50
          items: { type: integer }
        max_sources:
          type: integer
          minimum: 1
          maximum: 10
    PostDocumentChatMessageResponse:
      type: object
      required: [session_id, user_message_id, assistant_message_id, answer, sources]
      properties:
        session_id: { type: string, format: uuid }
        user_message_id: { type: string, format: uuid }
        assistant_message_id: { type: string, format: uuid }
        answer: { type: string }
        sources:
          type: array
          items: { $ref: "#/components/schemas/DocumentChatSource" }
    Session:
      type: object
      additionalProperties: true
    User:
      type: object
      additionalProperties: true
paths:
  /healthz:
    get:
      security: []
      responses:
        "200":
          description: Healthy
          content:
            text/plain:
              schema: { type: string }
  /readyz:
    get:
      security: []
      responses:
        "200":
          description: Ready
          content:
            text/plain:
              schema: { type: string }
  /metrics:
    get:
      security: []
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema: { type: string }
  /api/auth/login:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
  /api/auth/paperless-login:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in through the optional Paperless login bridge
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
  /api/auth/oidc/config:
    get:
      security: []
      responses:
        "200":
          description: OIDC login availability
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OidcConfigResponse" }
  /api/auth/oidc/login:
    get:
      security: []
      parameters:
        - name: return_to
          in: query
          schema: { type: string }
      responses:
        "307": { description: Redirect to OIDC provider }
  /api/auth/oidc/callback:
    get:
      security: []
      parameters:
        - name: code
          in: query
          schema: { type: string }
        - name: state
          in: query
          schema: { type: string }
        - name: error
          in: query
          schema: { type: string }
        - name: error_description
          in: query
          schema: { type: string }
      responses:
        "303": { description: Login completed and session cookies issued }
  /api/auth/logout:
    post:
      responses:
        "200": { description: Logged out }
  /api/auth/me:
    get:
      responses:
        "200":
          description: Current principal
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
  /api/auth/change-password:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string, format: password }
                new_password: { type: string, format: password }
      responses:
        "200": { description: Password changed and sessions revoked }
  /api/auth/sessions:
    get:
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Session" }
  /api/auth/sessions/{id}/revoke:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Session revoked }
  /api/settings:
    get:
      responses:
        "200":
          description: Runtime settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeSettings" }
    put:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateSettingsRequest" }
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeSettings" }
  /api/settings/test-paperless:
    post:
      responses:
        "200":
          description: Paperless connection result
  /api/notifications/test:
    post:
      responses:
        "200":
          description: Notification webhook delivery test result
  /api/model-providers/test:
    post:
      responses:
        "200":
          description: Provider connection result
  /api/model-providers/{name}/models:
    post:
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Installed Ollama models for a configured provider
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OllamaInstalledModelsResponse" }
  /api/secret-references:
    get:
      responses:
        "200":
          description: Secret references
  /api/prompts:
    get:
      responses:
        "200":
          description: Prompts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Prompt" }
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stage, name, content]
              properties:
                stage: { $ref: "#/components/schemas/Stage" }
                name: { type: string }
                content: { type: string }
                output_schema: true
                activate: { type: boolean }
      responses:
        "200": { description: Created prompt }
  /api/prompts/usage:
    get:
      responses:
        "200":
          description: Prompt usage summaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PromptUsage" }
  /api/prompts/{id}/activate:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Prompt activated }
  /api/prompts/test:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TestPromptRequest" }
      responses:
        "200":
          description: Prompt test result with parsed output and validation errors
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TestPromptResponse" }
  /api/paperless/sync-metadata:
    post:
      responses:
        "200":
          description: Sync summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaperlessSyncResponse" }
  /api/paperless/consistency:
    get:
      responses:
        "200":
          description: Paperless metadata consistency report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PaperlessConsistencyResponse" }
  /api/paperless/completion-tags/reconcile:
    post:
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReconcileCompletionTagsRequest" }
      responses:
        "200":
          description: Completion tag reconciliation plan or applied changes
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReconcileCompletionTagsResponse" }
  /api/dashboard:
    get:
      parameters:
        - name: range
          in: query
          schema:
            type: string
            enum: ["24h", "7d", "30d", "90d", "12m", "all"]
            default: "24h"
      responses:
        "200":
          description: Dashboard counts and analytics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardResponse" }
  /api/dashboard/live:
    get:
      responses:
        "200":
          description: Live processing and lightweight debug status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardLiveStatus" }
  /api/statistics:
    get:
      description: >-
        Usage, cost and pipeline-throughput analytics over a custom time range
        for the Statistics page. Defaults apply only when a parameter is
        absent or blank; a present-but-unparseable value is rejected with 400.
      parameters:
        - name: from
          in: query
          description: >-
            Inclusive range start: an RFC3339 timestamp or a bare YYYY-MM-DD
            date (the day's first instant, UTC). Defaults to `to` minus 30
            days.
          schema: { type: string }
        - name: to
          in: query
          description: >-
            Exclusive range end: an RFC3339 timestamp or a bare YYYY-MM-DD
            date. A bare date means the END of that day (the next UTC
            midnight), so `from` and `to` naming the same day cover exactly
            that day. Defaults to now.
          schema: { type: string }
        - name: bucket
          in: query
          description: Time-series bucket granularity.
          schema:
            type: string
            enum: ["hour", "day", "week", "month"]
            default: "day"
      responses:
        "200":
          description: Statistics summary, zero-filled time series and breakdowns
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StatisticsResponse" }
        "400":
          description: Unparseable from/to, from not before to, or unknown bucket
  /api/workflow/mode:
    put:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateWorkflowModeRequest" }
      responses:
        "200":
          description: Updated runtime settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeSettings" }
  /api/workflow/controls:
    patch:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateWorkflowControlsRequest" }
      responses:
        "200":
          description: Updated runtime settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeSettings" }
  /api/inventory:
    get:
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
        - name: date_from
          in: query
          required: false
          schema: { type: string, format: date }
          description: >-
            Inclusive lower bound on document_date (YYYY-MM-DD). A present but
            unparseable value is rejected with 400.
        - name: date_to
          in: query
          required: false
          schema: { type: string, format: date }
          description: >-
            Inclusive upper bound on document_date (YYYY-MM-DD). A present but
            unparseable value is rejected with 400.
      responses:
        "200":
          description: Inventory page
        "400":
          description: Unparseable date_from/date_to filter
  /api/ai/runtime-hints:
    get:
      summary: Live runtime hints for a provider (loaded model, VRAM, version)
      parameters:
        - name: provider
          in: query
          required: false
          schema: { type: string }
          description: Provider name. Defaults to ai.default_provider.
      responses:
        "200":
          description: Hints (whether reachable or not is in the body)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiRuntimeHints" }
  /api/inventory/{document_id}/metadata-trace:
    get:
      summary: Diagnostic trace of the most recent metadata-stage run
      parameters:
        - name: document_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Trace found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MetadataTrace" }
        "404":
          description: No metadata run exists for this document
  /api/chat/sessions:
    get:
      responses:
        "200":
          description: Document chat sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/DocumentChatSession" }
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateDocumentChatSessionRequest" }
      responses:
        "200":
          description: Created document chat session
          content:
            application/json:
              schema:
                type: object
                required: [id, title]
                properties:
                  id: { type: string, format: uuid }
                  title: { type: string }
  /api/chat/sessions/{id}:
    get:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Document chat messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/DocumentChatMessage" }
  /api/chat/sessions/{id}/messages:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PostDocumentChatMessageRequest" }
      responses:
        "200":
          description: Created user and assistant chat messages
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PostDocumentChatMessageResponse" }
  /api/documents/{paperless_document_id}/trigger:
    post:
      parameters:
        - name: paperless_document_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                stages:
                  type: array
                  items: { $ref: "#/components/schemas/Stage" }
                mode: { $ref: "#/components/schemas/ProcessingMode" }
      responses:
        "200": { description: Created or reused run }
  /api/batches/ocr:
    post:
      responses:
        "200": { description: Queued missing OCR jobs }
  /api/batches/full:
    post:
      responses:
        "200": { description: Queued missing full pipeline jobs }
  /api/reviews:
    get:
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
      responses:
        "200": { description: Review queue }
  /api/reviews/{id}/approve:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Approved and applied }
  /api/reviews/batch:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, decision]
              properties:
                ids:
                  type: array
                  maxItems: 100
                  items: { type: string, format: uuid }
                decision:
                  type: string
                  enum: [approve, reject]
      responses:
        "200": { description: Batch review result }
  /api/reviews/{id}/reject:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Rejected }
  /api/reviews/{id}/edit:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patch]
              properties:
                patch:
                  type: object
                  additionalProperties: true
      responses:
        "200": { description: Edited and applied }
  /api/operations/recovery:
    get:
      parameters:
        - name: older_than_seconds
          in: query
          schema: { type: integer, minimum: 60, maximum: 86400, default: 600 }
      responses:
        "200":
          description: Stale lease and stuck run recovery candidates
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecoveryStatusResponse" }
  /api/operations/recovery/stale-leases:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecoveryRequest" }
      responses:
        "200":
          description: Requeued stale running jobs whose leases are older than the recovery window
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecoveryActionResponse" }
  /api/operations/recovery/stuck-runs:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecoveryRequest" }
      responses:
        "200":
          description: Completed or failed active runs that no longer have active jobs
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecoveryActionResponse" }
  /api/audit:
    get:
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, format: int64, minimum: 1, maximum: 500 }
      responses:
        "200": { description: Audit events }
  /api/audit/export.csv:
    get:
      responses:
        "200":
          description: Audit events as CSV
          content:
            text/csv:
              schema: { type: string }
  /api/audit/integrity:
    get:
      responses:
        "200":
          description: Audit hash-chain verification
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditIntegrityReport" }
  /api/audit/retention/apply:
    post:
      responses:
        "200":
          description: Applied configured audit and AI artifact retention
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RetentionResult" }
  /api/users:
    get:
      responses:
        "200": { description: Users }
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, roles]
              properties:
                username: { type: string }
                email: { type: [string, "null"] }
                password: { type: string, format: password }
                roles:
                  type: array
                  items: { $ref: "#/components/schemas/Role" }
      responses:
        "200": { description: Created user }
  /api/users/{id}/enable:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Enabled user }
  /api/users/{id}/disable:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Disabled user and revoked sessions }
  /api/users/{id}/roles:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roles]
              properties:
                roles:
                  type: array
                  items: { $ref: "#/components/schemas/Role" }
      responses:
        "200": { description: Updated user roles }
  /api/users/{id}/reset-password:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string, format: password }
      responses:
        "200": { description: Reset password and revoked sessions }
  /api/api-tokens:
    get:
      responses:
        "200": { description: API tokens }
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scopes]
              properties:
                name: { type: string }
                expires_in_days: { type: [integer, "null"] }
                scopes:
                  type: array
                  items:
                    type: string
                    enum:
                      - runs:read
                      - runs:write
                      - inventory:read
                      - batches:write
                      - chat:write
                      - reviews:read
                      - reviews:write
                      - settings:read
                      - settings:write
                      - users:manage
                      - audit:read
      responses:
        "200": { description: Created token, raw token shown once }
  /api/api-tokens/{id}/rotate:
    post:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                expires_in_days: { type: [integer, "null"] }
      responses:
        "200": { description: Rotated token, raw token shown once }
  /api/api-tokens/{id}:
    delete:
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Revoked token }
