# This public-safe pipeline is retained for forks and downstream GitLab users.
# GitHub Actions is the canonical public gate for the official project; CI/CD
# is intentionally disabled in the official GitLab.com source mirror.

stages:
  - validate
  - test
  - build
  - scan

# Avoid duplicate pipelines: run for branch pushes only when no MR is open, and
# for merge_request_event; tags always run. interruptible lets a newer push
# cancel a superseded pipeline. (#276)
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

default:
  interruptible: true

variables:
  RUST_IMAGE: rust:1.96-bookworm
  NODE_IMAGE: node:26-bookworm
  GITLEAKS_VERSION: v8.30.1
  GITLEAKS_CONFIG: policy/gitleaks.toml
  # CONTAINER_* parameterise the release image build, which is performed
  # manually (tag + manual image build) rather than in this pipeline — see
  # docs/RELEASE_CHECKLIST.md. They are read by the group-level container-build
  # template when present; no job in THIS file consumes them.
  CONTAINER_CONTEXT: "."
  CONTAINER_DOCKERFILE: "Dockerfile"

.default_retry:
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure

.rust_public_base:
  image: "$RUST_IMAGE"
  extends:
    - .default_retry
  before_script:
    - rustup component add rustfmt clippy

.frontend_base:
  image: "$NODE_IMAGE"
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/.pnpm-store/
  before_script:
    - node --version
    - npm install -g pnpm@10.34.1
    - cd frontend
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

public:rust:fmt:
  stage: validate
  extends: .rust_public_base
  script:
    - cargo fmt --all -- --check

public:rust:test:
  stage: test
  extends: .rust_public_base
  script:
    - cargo test --workspace --locked

public:rust:db-integration:
  stage: test
  extends: .rust_public_base
  services:
    - name: postgres:18
      alias: postgres
  variables:
    POSTGRES_DB: archivist_ci
    POSTGRES_USER: archivist_ci
    POSTGRES_HOST_AUTH_METHOD: trust
    DATABASE_URL: "postgres://archivist_ci@postgres:5432/archivist_ci"
  script:
    - bash scripts/verify/migration_smoke.sh

public:rust:clippy:
  stage: test
  extends: .rust_public_base
  script:
    - cargo clippy --workspace --all-targets -- -D warnings

# Offline contract matrix for the opt-in live SGLang/MiniMax M3 probe. The
# mock server exercises success, failure, timeout, response bounds and
# redaction; ordinary pipelines never contact an LLM endpoint.
public:sglang:minimax-m3:contract-mock:
  stage: test
  image: "$NODE_IMAGE"
  extends: .default_retry
  script:
    - node --test scripts/verify/sglang_minimax_m3_contract.test.mjs

# Offline capacity harness contract. This uses a local mock only; real load
# remains an explicit operator command and never runs in ordinary pipelines.
public:sglang:minimax-m3:capacity-mock:
  stage: test
  image: "$NODE_IMAGE"
  extends: .default_retry
  script:
    - node --test scripts/verify/sglang_minimax_m3_capacity.test.mjs

# Prove that the restrictive base and the opt-in custom-AI component both
# render with a pinned public kubectl, and that only the opt-in render adds a
# second NetworkPolicy. Detailed selector/port assertions run in pnpm test.
public:kubernetes:custom-ai-egress:render:
  stage: test
  image:
    name: alpine/k8s:1.36.2@sha256:44ef4942e171939b9c665a4a84beb80e2dcdb9a24330d4651cfdfd2e9deecc47
    entrypoint: [""]
  extends: .default_retry
  script:
    - kubectl kustomize deploy/kubernetes/base > /tmp/base.yaml
    - kubectl kustomize deploy/kubernetes/examples/custom-ai-egress > /tmp/custom-ai.yaml
    - |
      test "$(grep -c '^kind: NetworkPolicy$' /tmp/base.yaml)" -eq 1
      test "$(grep -c '^kind: NetworkPolicy$' /tmp/custom-ai.yaml)" -eq 2
      grep -q 'name: paperless-archivist-custom-ai-egress' /tmp/custom-ai.yaml

public:kubernetes:monitoring:contract:
  stage: test
  extends:
    - .frontend_base
    - .default_retry
  script:
    - node --test ../scripts/verify/kubernetes_monitoring_contract.test.mjs

public:kubernetes:monitoring:render:
  stage: test
  image:
    name: alpine/k8s:1.36.2@sha256:44ef4942e171939b9c665a4a84beb80e2dcdb9a24330d4651cfdfd2e9deecc47
    entrypoint: [""]
  extends: .default_retry
  script:
    - kubectl kustomize deploy/kubernetes/base > /tmp/base.yaml
    - kubectl kustomize deploy/kubernetes/examples/monitoring > /tmp/monitoring.yaml
    - test "$(grep -c '^kind: ServiceMonitor$' /tmp/base.yaml || true)" -eq 0
    - test "$(grep -c '^kind: PrometheusRule$' /tmp/base.yaml || true)" -eq 0
    - test "$(grep -c '^kind: ServiceMonitor$' /tmp/monitoring.yaml)" -eq 1
    - test "$(grep -c '^kind: PrometheusRule$' /tmp/monitoring.yaml)" -eq 1

public:prometheus:monitoring-rules:
  stage: test
  image:
    name: quay.io/prometheus/prometheus@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
    entrypoint: [""]
  extends: .default_retry
  script:
    - promtool check rules scripts/verify/paperless_archivist_alert_rules.yaml
    - promtool test rules scripts/verify/paperless_archivist_alert_rules.test.yaml

# Available only when a protected ref receives the protected endpoint
# variable. Authentication is an optional GitLab file variable, so no secret
# appears in the command line, logs, report, artifacts, or repository.
sglang:minimax-m3:live-contract:
  stage: test
  image: "$NODE_IMAGE"
  interruptible: false
  timeout: 30m
  resource_group: sglang-minimax-m3-live-contract
  variables:
    SGLANG_CONTRACT_REPORT_FILE: sglang-minimax-m3-contract-report.json
  rules:
    - if: '$CI_COMMIT_REF_PROTECTED == "true" && $SGLANG_CONTRACT_BASE_URL'
      when: manual
      allow_failure: false
    - when: never
  script:
    - node scripts/verify/sglang_minimax_m3_contract.mjs
  artifacts:
    when: always
    paths:
      - sglang-minimax-m3-contract-report.json
    expire_in: 30 days

public:rust:audit:
  stage: scan
  extends: .rust_public_base
  # Cache the compiled cargo-audit/cargo-deny binaries so they aren't rebuilt
  # from source on every pipeline. (#276)
  cache:
    key: cargo-security-tools
    paths:
      - .cargo-tools/bin/
  variables:
    CARGO_INSTALL_ROOT: $CI_PROJECT_DIR/.cargo-tools
  before_script:
    - export PATH="$CI_PROJECT_DIR/.cargo-tools/bin:$PATH"
  script:
    - command -v cargo-audit || cargo install cargo-audit --locked
    - cargo audit

public:rust:deny:
  stage: scan
  extends: .rust_public_base
  cache:
    key: cargo-security-tools
    paths:
      - .cargo-tools/bin/
  variables:
    CARGO_INSTALL_ROOT: $CI_PROJECT_DIR/.cargo-tools
  before_script:
    - export PATH="$CI_PROJECT_DIR/.cargo-tools/bin:$PATH"
  script:
    - command -v cargo-deny || cargo install cargo-deny --locked
    - cargo deny check

frontend:openapi-client:
  stage: validate
  extends:
    - .frontend_base
    - .default_retry
  script:
    - pnpm contract:routes
    - pnpm contract:settings
    - pnpm generate:client
    - git diff --exit-code -- src/api/schema.ts

frontend:typecheck:
  stage: test
  extends:
    - .frontend_base
    - .default_retry
  script:
    - pnpm typecheck

# Explicit gate for the public/exported pipeline. The authoritative internal
# shared blueprint also executes it through the frontend `pnpm lint` script.
frontend:i18n:
  stage: test
  extends:
    - .frontend_base
    - .default_retry
  script:
    - pnpm i18n:check

frontend:accessibility:
  stage: test
  extends:
    - .frontend_base
    - .default_retry
  script:
    - pnpm accessibility:check

frontend:a11y-runtime:
  stage: test
  extends:
    - .frontend_base
    - .default_retry
  script:
    - pnpm test:a11y

frontend:build:
  stage: build
  extends:
    - .frontend_base
    - .default_retry
  script:
    - pnpm build
  artifacts:
    when: on_success
    paths:
      - frontend/dist/
    expire_in: 7 days

frontend:audit:
  stage: scan
  extends:
    - .frontend_base
    - .default_retry
  script:
    - pnpm audit --audit-level high

# Enforce secret scanning in-pipeline using policy/gitleaks.toml. Previously
# GITLEAKS_CONFIG was declared but no job consumed it, so the policy was only
# enforced if a group-level template happened to inject a gitleaks job. This
# job makes the scan explicit and self-contained (#270). GIT_DEPTH: 0 fetches
# full history so gitleaks scans every commit, not just the tip.
secret-scan:gitleaks:
  stage: scan
  image:
    name: "zricethezav/gitleaks:$GITLEAKS_VERSION"
    entrypoint: [""]
  extends: .default_retry
  variables:
    GIT_DEPTH: 0
  script:
    - gitleaks detect --source . --config "$GITLEAKS_CONFIG" --redact --verbose
