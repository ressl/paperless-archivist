apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-archivist-worker
  labels:
    app.kubernetes.io/name: paperless-archivist
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-archivist
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-archivist
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: paperless-archivist
      # The worker drains in-flight jobs for up to 25s after SIGTERM before
      # exiting; 60s leaves headroom over the 30s Kubernetes default.
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/example/paperless-archivist:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/archivist-worker"]
          envFrom:
            - configMapRef:
                name: paperless-archivist-config
            - secretRef:
                name: paperless-archivist-secrets
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "test $(( $(date +%s) - $(cat /tmp/archivist-worker.heartbeat 2>/dev/null || echo 0) )) -lt 120"
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
