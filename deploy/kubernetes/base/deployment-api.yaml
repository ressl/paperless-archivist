apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-archivist-api
  labels:
    app.kubernetes.io/name: paperless-archivist
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-archivist
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-archivist
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: paperless-archivist
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/example/paperless-archivist:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: paperless-archivist-config
            - secretRef:
                name: paperless-archivist-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          # The API buffers downloads in memory rather than on disk, so /tmp
          # sees little use; a bound still prevents an unexpected disk-fill on
          # the only writable path under readOnlyRootFilesystem. #297
          emptyDir:
            sizeLimit: 512Mi
