apiVersion: v1
kind: ConfigMap
metadata:
  name: paperless-archivist-config
data:
  ARCHIVIST_HTTP_ADDR: "0.0.0.0:8080"
  ARCHIVIST_COOKIE_SECURE: "true"
  ARCHIVIST_OIDC_ENABLED: "false"
  ARCHIVIST_OIDC_ISSUER_URL: "https://issuer.example.com"
  ARCHIVIST_OIDC_CLIENT_ID: "paperless-archivist"
  ARCHIVIST_OIDC_REDIRECT_URI: "https://paperless-archivist.example.com/api/auth/oidc/callback"
  ARCHIVIST_OIDC_ADMIN_USERS: "admin@example.com"
  ARCHIVIST_OIDC_DEFAULT_ROLES: "viewer"
  # IdP role assertion (ZITADEL): roles in the ID token are mapped to app roles.
  # Requires the IdP to assert roles into the ID token. Defaults fit the
  # archivist-<role> convention; override only if your claim/role names differ.
  ARCHIVIST_OIDC_ROLES_CLAIM: "urn:zitadel:iam:org:project:roles"
  ARCHIVIST_OIDC_ROLE_MAPPINGS: "archivist-admin=admin,archivist-operator=operator,archivist-reviewer=reviewer,archivist-auditor=auditor,archivist-viewer=viewer"
  ARCHIVIST_WORKER_CONCURRENCY: "2"
  # Must comfortably exceed ARCHIVIST_WORKER_CONCURRENCY — each in-flight job
  # holds Postgres connections during its query bursts. Pool too small =
  # "pool timed out" errors under load.
  ARCHIVIST_DB_MAX_CONNECTIONS: "10"
  ARCHIVIST_LOG_LEVEL: "info"
