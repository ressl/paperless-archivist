apiVersion: v1
kind: Secret
metadata:
  name: paperless-archivist-secrets
type: Opaque
stringData:
  DATABASE_URL: postgres://archivist:change-me@postgres.example.com:5432/archivist
  ARCHIVIST_SECRET_KEY: change-me-32-bytes-minimum
  ARCHIVIST_ADMIN_USERNAME: admin
  ARCHIVIST_ADMIN_PASSWORD: change-me-admin-password
  ARCHIVIST_OIDC_CLIENT_SECRET: ""
---
# Optional, dedicated Secret used by the opt-in monitoring component. Generate
# a long random value through your secret manager; never commit the real value.
apiVersion: v1
kind: Secret
metadata:
  name: paperless-archivist-metrics
type: Opaque
stringData:
  ARCHIVIST_METRICS_TOKEN: replace-with-a-long-random-metrics-token
