apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namePrefix: example-
resources:
  - ../../base
components:
  - ../../components/monitoring
patches:
  # The target label and every rule matcher form one configuration contract.
  # Replace all five values together when choosing another instance name.
  - target:
      group: monitoring.coreos.com
      version: v1
      kind: ServiceMonitor
      name: paperless-archivist
    patch: |-
      - op: replace
        path: /spec/endpoints/0/relabelings/0/replacement
        value: another-archivist
  - target:
      group: monitoring.coreos.com
      version: v1
      kind: PrometheusRule
      name: paperless-archivist
    patch: |-
      - op: replace
        path: /spec/groups/0/rules/0/expr
        value: (up{paperless_archivist_instance="another-archivist"} == 0) or absent(up{paperless_archivist_instance="another-archivist"})
      - op: replace
        path: /spec/groups/0/rules/1/expr
        value: max by (namespace, paperless_archivist_instance) (paperless_archivist_jobs_queued{paperless_archivist_instance="another-archivist"}) > 100
      - op: replace
        path: /spec/groups/0/rules/2/expr
        value: increase(paperless_archivist_job_failures_total{paperless_archivist_instance="another-archivist"}[15m]) > 5
      - op: replace
        path: /spec/groups/0/rules/3/expr
        value: increase(paperless_archivist_provider_quota_total{paperless_archivist_instance="another-archivist"}[1h]) > 0
