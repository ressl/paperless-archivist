image:
  repository: ghcr.io/example/paperless-archivist
  tag: "0.1.0"

ingress:
  enabled: true
  className: nginx
  host: paperless-archivist.example.com
  tlsSecretName: paperless-archivist-tls

database:
  existingSecret: paperless-archivist-secrets
  urlKey: DATABASE_URL
  engine: PostgreSQL 18

paperless:
  baseUrl: http://paperless.example.svc.cluster.local:8000
  tokenStorage: configure in the Settings UI or as an encrypted secret reference

oidc:
  enabled: false
  issuerUrl: https://issuer.example.com
  clientId: paperless-archivist
  clientSecretKey: ARCHIVIST_OIDC_CLIENT_SECRET
  redirectUri: https://paperless-archivist.example.com/api/auth/oidc/callback
  adminUsers: admin@example.com
  defaultRoles: viewer

monitoring:
  enabled: false
  existingSecret: paperless-archivist-metrics
  tokenKey: ARCHIVIST_METRICS_TOKEN
  prometheusNamespace: monitoring
  scrapeInterval: 30s
  alerts:
    queueDepth: 100
    queueFor: 30m
    permanentFailuresPer15m: 5
    providerQuotaWindow: 1h

providers:
  ollama:
    baseUrl: http://ollama.example.svc.cluster.local:11434
  openai:
    apiKeyStorage: configure in Settings UI
  anthropic:
    apiKeyStorage: configure in Settings UI

resources:
  api:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 768Mi
  worker:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "4"
      memory: 4Gi
