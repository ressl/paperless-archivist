services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    command:
      - postgres
      - -c
      - password_encryption=scram-sha-256
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archivist}
      POSTGRES_USER: ${POSTGRES_USER:-archivist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-archivist} -d ${POSTGRES_DB:-archivist}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - archivist-internal

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: paperless-archivist:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-archivist}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-archivist}
      ARCHIVIST_SECRET_KEY: ${ARCHIVIST_SECRET_KEY:?set ARCHIVIST_SECRET_KEY}
      ARCHIVIST_ADMIN_USERNAME: ${ARCHIVIST_ADMIN_USERNAME:-admin}
      ARCHIVIST_ADMIN_PASSWORD: ${ARCHIVIST_ADMIN_PASSWORD:?set ARCHIVIST_ADMIN_PASSWORD}
      ARCHIVIST_HTTP_ADDR: ${ARCHIVIST_HTTP_ADDR:-0.0.0.0:8080}
      ARCHIVIST_COOKIE_SECURE: ${ARCHIVIST_COOKIE_SECURE:-false}
      ARCHIVIST_OIDC_ENABLED: ${ARCHIVIST_OIDC_ENABLED:-false}
      ARCHIVIST_OIDC_ISSUER_URL: ${ARCHIVIST_OIDC_ISSUER_URL:-}
      ARCHIVIST_OIDC_CLIENT_ID: ${ARCHIVIST_OIDC_CLIENT_ID:-}
      ARCHIVIST_OIDC_CLIENT_SECRET: ${ARCHIVIST_OIDC_CLIENT_SECRET:-}
      ARCHIVIST_OIDC_REDIRECT_URI: ${ARCHIVIST_OIDC_REDIRECT_URI:-}
      ARCHIVIST_OIDC_ADMIN_USERS: ${ARCHIVIST_OIDC_ADMIN_USERS:-}
      ARCHIVIST_OIDC_DEFAULT_ROLES: ${ARCHIVIST_OIDC_DEFAULT_ROLES:-viewer}
      ARCHIVIST_OIDC_ROLES_CLAIM: ${ARCHIVIST_OIDC_ROLES_CLAIM:-urn:zitadel:iam:org:project:roles}
      ARCHIVIST_OIDC_ROLE_MAPPINGS: ${ARCHIVIST_OIDC_ROLE_MAPPINGS:-archivist-admin=admin,archivist-operator=operator,archivist-reviewer=reviewer,archivist-auditor=auditor,archivist-viewer=viewer}
      ARCHIVIST_LOG_LEVEL: ${ARCHIVIST_LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - archivist-internal
    deploy:
      resources:
        limits:
          memory: ${ARCHIVIST_API_MEMORY_LIMIT:-768m}
        reservations:
          memory: ${ARCHIVIST_API_MEMORY_RESERVATION:-256m}

  worker:
    image: paperless-archivist:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/archivist-worker"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-archivist}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-archivist}
      ARCHIVIST_SECRET_KEY: ${ARCHIVIST_SECRET_KEY:?set ARCHIVIST_SECRET_KEY}
      ARCHIVIST_WORKER_CONCURRENCY: ${ARCHIVIST_WORKER_CONCURRENCY:-2}
      ARCHIVIST_LOG_LEVEL: ${ARCHIVIST_LOG_LEVEL:-info}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - archivist-internal
    deploy:
      resources:
        limits:
          memory: ${ARCHIVIST_WORKER_MEMORY_LIMIT:-1g}
        reservations:
          memory: ${ARCHIVIST_WORKER_MEMORY_RESERVATION:-512m}

  ollama:
    image: ollama/ollama:0.30.7
    profiles: ["ollama"]
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    networks:
      - archivist-internal

volumes:
  postgres-data:
  ollama-data:

networks:
  archivist-internal:
